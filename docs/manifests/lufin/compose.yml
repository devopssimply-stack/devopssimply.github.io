# ===============================
# Docker Compose (Lufin)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: lufin_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: lufin
      POSTGRES_USER: lufin
      POSTGRES_PASSWORD: strongpassword

    volumes:
      - lufin_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lufin"]
      interval: 10s
      timeout: 5s
      retries: 5

  lufin:
    image: ghcr.io/vityaschel/lufin:latest
    container_name: lufin
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgres://lufin:strongpassword@db:5432/lufin
      NODE_ENV: production

    volumes:
      - lufin_data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  lufin_db_data:
  lufin_data: