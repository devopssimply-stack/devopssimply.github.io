# ===============================
# Docker Compose (Pasta)
# ===============================
# host: http://localhost:8087
# username:
# password:

services:
  pasta:
    image: cglatot/pasta:latest
    restart: unless-stopped
    ports:
      - "8087:80"
    volumes:
      - pasta_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pasta_data: