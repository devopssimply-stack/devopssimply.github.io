# ===============================
# Docker Compose (Perfice Client)
# ===============================
# host: http://localhost
# username:
# password:

services:
  perfice-client:
    image: ghcr.io/p0lloc/perfice_client:latest
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5