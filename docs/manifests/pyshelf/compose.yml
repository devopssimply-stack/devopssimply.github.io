# ===============================
# Docker Compose (PyShelf)
# ===============================
# host: http://localhost:8000
# username:
# password:

services:

  pyshelf:
    image: pyshelf/pyshelf:latest
    container_name: pyshelf
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_NAME=pyshelfdb
      - DATABASE_USER=pyshelfuser
      - DATABASE_PASSWORD=change_db_password
      - DATABASE_HOST=db
    volumes:
      - pyshelf_books:/books
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:17-alpine
    container_name: pyshelf-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=pyshelfdb
      - POSTGRES_USER=pyshelfuser
      - POSTGRES_PASSWORD=change_db_password
    volumes:
      - pyshelf_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyshelfuser -d pyshelfdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pyshelf_books:
  pyshelf_db: