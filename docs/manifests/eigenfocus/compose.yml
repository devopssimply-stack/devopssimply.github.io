# ===============================
# Docker Compose (Eigenfocus)
# ===============================
# host: http://localhost:3001
# username: (create inside app)
# password: (create inside app)

services:
  eigenfocus:
    image: eigenfocus/eigenfocus:1.5.0-free
    container_name: eigenfocus
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DEFAULT_HOST_URL: http://localhost:3001
      TZ: UTC
    volumes:
      - eigenfocus_data:/eigenfocus-app/app-data
    healthcheck:
      test: ["CMD-SHELL","wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  eigenfocus_data:
