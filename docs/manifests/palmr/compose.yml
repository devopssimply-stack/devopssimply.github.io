# ===============================
# Docker Compose (Palmr Stack)
# ===============================
# host: http://localhost:5487
# username:
# password:

services:

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresRootPassword
      POSTGRES_DB: palmr_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    restart: unless-stopped
    command: server /data --address ":6421" --console-address ":6422"
    environment:
      MINIO_ROOT_USER: minio_root_user
      MINIO_ROOT_PASSWORD: minioRootPassword
      MINIO_SITE_REGION: sa-east-1
    ports:
      - "6421:6421"
      - "6422:6422"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6421/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:6421 minio_root_user minioRootPassword &&
      mc mb local/files --ignore-existing &&
      mc anonymous set download local/files
      "

  palmr-api:
    image: kyantech/palmr-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://postgres:postgresRootPassword@postgres:5432/palmr_db?schema=public
      MINIO_ENDPOINT: minio
      MINIO_PORT: 6421
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: minio_root_user
      MINIO_ROOT_PASSWORD: minioRootPassword
      MINIO_REGION: sa-east-1
      MINIO_BUCKET_NAME: files
      FRONTEND_URL: http://localhost:5487
      SERVER_IP: localhost
      MAX_FILESIZE: 1073741824
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  palmr-app:
    image: kyantech/palmr-app:latest
    restart: unless-stopped
    depends_on:
      palmr-api:
        condition: service_healthy
    ports:
      - "5487:5487"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_BASE_URL: http://palmr-api:3333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5487"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data: