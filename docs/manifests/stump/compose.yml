# ===============================
# Docker Compose (Stump)
# ===============================
# host: http://localhost:10801
# username:
# password:

services:
  stump:
    image: aaronleopold/stump:latest
    container_name: stump
    restart: unless-stopped
    ports:
      - "10801:10801"
    environment:
      PUID: "1000"
      PGID: "1000"
      STUMP_CONFIG_DIR: /config
    volumes:
      - stump_config:/config
      - stump_books:/data
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:10801"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  stump_config:
  stump_books: