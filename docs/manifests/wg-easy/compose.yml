# ===============================
# Docker Compose (wg-easy)
# ===============================
# host: http://localhost:51821
# username: (set via PASSWORD)
# password: (set below)

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
      - "51821:51821"
    environment:
      WG_HOST: "your-server-ip-or-domain"
      PASSWORD: "changeme"
    volumes:
      - wireguard_data:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:51821"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  wireguard_data: