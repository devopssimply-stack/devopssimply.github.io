# ===============================
# Docker Compose (multi-scrobbler)
# ===============================
# host: http://localhost:9078
# username:
# password:

services:
  multi-scrobbler:
    image: foxxmd/multi-scrobbler:latest
    container_name: multi-scrobbler
    restart: unless-stopped
    ports:
      - "9078:9078"
    environment:
      - TZ=Etc/GMT
      # Optional examples:
      # - JELLYFIN_APIKEY=your_key
      # - JELLYFIN_URL=http://jellyfin:8096
      # - JELLYFIN_USER=username
      # - MALOJA_URL=http://maloja:42010
      # - MALOJA_API_KEY=your_key
      # - PUID=1000
      # - PGID=1000
      # - BASE_URL=http://192.168.0.101:9078
    volumes:
      - multi_scrobbler_config:/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:9078/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  multi_scrobbler_config: