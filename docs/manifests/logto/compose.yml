# ===============================
# Docker Compose (Logto)
# ===============================
# host: http://localhost:3001
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: logto_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: logto
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: strongpassword

    volumes:
      - logto_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: logto_redis
    restart: unless-stopped

    volumes:
      - logto_redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  logto:
    image: ghcr.io/logto-io/logto:latest
    container_name: logto
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "3001:3001"

    environment:
      DATABASE_URL: postgres://logto:strongpassword@db:5432/logto
      REDIS_URL: redis://redis:6379
      NODE_ENV: production

    volumes:
      - logto_data:/var/lib/logto

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  logto_db_data:
  logto_redis_data:
  logto_data: