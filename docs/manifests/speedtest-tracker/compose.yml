# ===============================
# Docker Compose (Speedtest Tracker)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      PUID: "1000"
      PGID: "1000"
      APP_KEY: replace_with_generated_key
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: speedtest_tracker
      DB_USERNAME: speedtest_tracker
      DB_PASSWORD: password
    volumes:
      - speedtest_config:/config
      - speedtest_ssl:/config/keys
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17
    container_name: speedtest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: speedtest_tracker
      POSTGRES_USER: speedtest_tracker
      POSTGRES_PASSWORD: password
    volumes:
      - speedtest_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U speedtest_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  speedtest_config:
  speedtest_ssl:
  speedtest_db: