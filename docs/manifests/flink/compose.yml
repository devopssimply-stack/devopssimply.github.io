# ===============================
# Docker Compose (Flink)
# ===============================
# host: http://localhost:8080
# username: (none — open API)
# password: (none — optional via reverse proxy)

services:
  flink:
    image: quay.io/rtraceio/flink:latest
    container_name: flink
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Optional telemetry or token config if supported
      # - ASPNETCORE_ENVIRONMENT=Production
      # - FLINK__METRICS__ENABLED=true
    volumes:
      # Persist SQLite and other data
      - flink_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flink_data:
