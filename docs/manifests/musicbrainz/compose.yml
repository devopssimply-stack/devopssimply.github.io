services:
  musicbrainz:
    image: ghcr.io/linuxserver/musicbrainz
    container_name: musicbrainz
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - BRAINZCODE=
      - WEBADDRESS=
      - NPROC= #optional
    volumes:
      - :/config
      - :/data
    ports:
      - 5000:5000
    restart: unless-stopped