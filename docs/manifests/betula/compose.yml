services:
  betula:
    container_name: betula
    image: ghcr.io/bouncepaw/betula:latest
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      # Public URL where Betula is accessible
      BETULA_BASE_URL: http://localhost:8080

      # Path where data is stored inside container
      BETULA_DATA_DIR: /data

    volumes:
      - ./data:/data
