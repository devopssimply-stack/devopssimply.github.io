# ===============================
# Docker Compose (Termix)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      PORT: "8080"

    volumes:
      - termix_data:/app/data

volumes:
  termix_data: