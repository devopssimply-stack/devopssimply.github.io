# ===============================
# Docker Compose (Pulse)
# ===============================
# host: http://localhost:7655
# username:
# password:

services:
  pulse:
    image: rcourtman/pulse:latest
    container_name: pulse
    restart: unless-stopped
    ports:
      - "7655:7655"
    volumes:
      - pulse_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7655/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pulse_data: