# ===============================
# Docker Compose (FileGator)
# ===============================
# host: http://localhost:8080
# username: defined in users.json
# password: defined in users.json

services:
  filegator:
    image: filegator/filegator:latest
    container_name: filegator
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Repository (files exposed in UI)
      - filegator_repository:/var/www/filegator/repository
      # Persistent users database
      - filegator_users:/var/www/filegator/private
      # Optional custom configuration
      - filegator_config:/var/www/filegator/config
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  filegator_repository:
  filegator_users:
  filegator_config:
