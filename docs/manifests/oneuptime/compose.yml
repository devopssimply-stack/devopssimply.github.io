# ===============================
# Docker Compose (OneUptime)
# ===============================
# Dashboard: http://localhost
# Default admin: created on first setup

services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: oneuptime
      POSTGRES_USER: oneuptime
      POSTGRES_PASSWORD: change_this_password
    volumes:
      - oneuptime_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneuptime -d oneuptime"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - oneuptime_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    volumes:
      - oneuptime_clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  app:
    image: oneuptime/app:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: oneuptime
      DATABASE_PASSWORD: change_this_password
      DATABASE_NAME: oneuptime
      REDIS_HOST: redis
      CLICKHOUSE_HOST: clickhouse
    ports:
      - "80:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  oneuptime_postgres:
  oneuptime_redis:
  oneuptime_clickhouse: