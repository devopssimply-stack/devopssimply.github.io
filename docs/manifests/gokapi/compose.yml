# ===============================
# Docker Compose (Gokapi)
# ===============================
# host: http://localhost:53842
# username: (set up via setup wizard)
# password: (set up via setup wizard)

services:
  gokapi:
    image: f0rc3/gokapi:latest
    restart: unless-stopped
    ports:
      - "53842:53842"
    volumes:
      - gokapi-data:/app/data
      - gokapi-config:/app/config
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:53842/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gokapi-data:
  gokapi-config:
