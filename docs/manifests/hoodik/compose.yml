# ===============================
# Docker Compose (Hoodik)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  hoodik:
    image: ghcr.io/hudikhq/hoodik:latest
    container_name: hoodik
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TZ=UTC
    volumes:
      - hoodik_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  hoodik_data: