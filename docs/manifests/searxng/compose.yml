# ===============================
# Docker Compose (SearXNG + Caddy)
# ===============================
# host: https://localhost
# username:
# password:

services:

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    network_mode: host
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_site:/etc/caddy
    environment:
      SEARXNG_HOSTNAME: "https://localhost"
      SEARXNG_TLS: "internal"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped


  redis:
    image: valkey/valkey:8-alpine
    container_name: redis
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey_data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped


  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - searxng_config:/etc/searxng
    environment:
      SEARXNG_BASE_URL: "https://localhost/"
      UWSGI_WORKERS: "4"
      UWSGI_THREADS: "4"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      - redis
    restart: unless-stopped


volumes:
  caddy_data:
  caddy_config:
  caddy_site:
  valkey_data:
  searxng_config: