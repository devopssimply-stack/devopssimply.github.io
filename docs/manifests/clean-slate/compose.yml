services:
  database:
    image: postgres:15-alpine
    container_name: cleanslate-database
    restart: unless-stopped
    pull_policy: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres

    volumes:
      - database:/var/lib/postgresql/data

    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - cleanslate

  graphql-server:
    image: ghcr.io/successible/cleanslate/graphql-server:latest
    container_name: cleanslate-graphql
    restart: unless-stopped
    pull_policy: always

    environment:
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET}
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@database:5432/postgres
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "false"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,webhook-log,websocket-log,query-log
      HASURA_GRAPHQL_CORS_DOMAIN: "https://${DOMAIN}"
      HASURA_GRAPHQL_JWT_SECRET: ${HASURA_GRAPHQL_JWT_SECRET}

    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:${HASURA_PORT:-8080}:8080"

    depends_on:
      database:
        condition: service_healthy

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - cleanslate

  authentication-server:
    image: ghcr.io/successible/cleanslate/authentication-server:latest
    container_name: cleanslate-auth
    restart: unless-stopped
    pull_policy: always

    environment:
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET}
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET}
      NEXT_PUBLIC_USE_FIREBASE: ${NEXT_PUBLIC_USE_FIREBASE:-false}

    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:${AUTHENTICATION_SERVER_PORT:-3001}:3001"

    depends_on:
      - graphql-server

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - cleanslate

  client:
    image: ghcr.io/successible/cleanslate/client:latest
    container_name: cleanslate-client
    restart: unless-stopped
    pull_policy: always

    environment:
      NEXT_PUBLIC_VERSION: ${NEXT_PUBLIC_VERSION}
      NEXT_PUBLIC_USE_FIREBASE: ${NEXT_PUBLIC_USE_FIREBASE:-false}
      NEXT_PUBLIC_FIREBASE_CONFIG: ${NEXT_PUBLIC_FIREBASE_CONFIG:-{}}
      NEXT_PUBLIC_LEGAL_LINK: ${NEXT_PUBLIC_LEGAL_LINK:-no}
      NEXT_PUBLIC_LOGIN_WITH_APPLE: ${NEXT_PUBLIC_LOGIN_WITH_APPLE:-no}
      NEXT_PUBLIC_LOGIN_WITH_FACEBOOK: ${NEXT_PUBLIC_LOGIN_WITH_FACEBOOK:-no}
      NEXT_PUBLIC_LOGIN_WITH_GITHUB: ${NEXT_PUBLIC_LOGIN_WITH_GITHUB:-no}
      NEXT_PUBLIC_LOGIN_WITH_GOOGLE: ${NEXT_PUBLIC_LOGIN_WITH_GOOGLE:-no}
      NEXT_PUBLIC_REACT_SENTRY_DSN: ${NEXT_PUBLIC_REACT_SENTRY_DSN:-no}

    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:${CLIENT_PORT:-3000}:3000"

    depends_on:
      - graphql-server

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - cleanslate

networks:
  cleanslate:
    driver: bridge
    
volumes:
  database:
