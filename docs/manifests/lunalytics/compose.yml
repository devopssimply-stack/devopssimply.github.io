# ===============================
# Docker Compose (Lunalytics)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: lunalytics_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: lunalytics
      POSTGRES_USER: lunalytics
      POSTGRES_PASSWORD: strongpassword

    volumes:
      - lunalytics_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunalytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  lunalytics:
    image: ghcr.io/ksjaay/lunalytics:latest
    container_name: lunalytics
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgres://lunalytics:strongpassword@db:5432/lunalytics
      NODE_ENV: production

    volumes:
      - lunalytics_data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  lunalytics_db_data:
  lunalytics_data: