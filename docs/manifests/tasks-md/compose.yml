# ===============================
# Docker Compose (tasks.md)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  tasksmd:
    image: baldissaramatheus/tasks.md:latest
    container_name: tasksmd
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PUID: "1000"
      PGID: "1000"
    volumes:
      - tasksmd_tasks:/tasks
      - tasksmd_config:/config
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tasksmd_tasks:
  tasksmd_config: