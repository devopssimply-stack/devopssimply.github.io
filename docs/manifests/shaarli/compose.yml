# ===============================
# Docker Compose (Shaarli + Traefik)
# ===============================
# host: https://shaarli.localhost
# username:
# password:

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped

    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=admin@example.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

  shaarli:
    image: ghcr.io/shaarli/shaarli:latest
    container_name: shaarli
    restart: unless-stopped

    volumes:
      - shaarli_data:/var/www/shaarli/data
      - shaarli_cache:/var/www/shaarli/cache

    labels:
      - traefik.enable=true
      - traefik.http.routers.shaarli.rule=Host(`shaarli.localhost`)
      - traefik.http.routers.shaarli.entrypoints=websecure
      - traefik.http.routers.shaarli.tls.certresolver=le
      - traefik.http.services.shaarli.loadbalancer.server.port=80

volumes:
  shaarli_data:
  shaarli_cache:
  traefik_letsencrypt: