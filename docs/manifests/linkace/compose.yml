# ===============================
# Docker Compose (LinkAce)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: linkace_db
    restart: unless-stopped

    environment:
      - POSTGRES_DB=linkace
      - POSTGRES_USER=linkace
      - POSTGRES_PASSWORD=strongpassword

    volumes:
      - linkace_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkace"]
      interval: 10s
      timeout: 5s
      retries: 5

  linkace:
    image: ghcr.io/kovah/linkace:latest
    container_name: linkace
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8080:80"

    environment:
      - APP_ENV=production
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=linkace
      - DB_USERNAME=linkace
      - DB_PASSWORD=strongpassword

    volumes:
      - linkace_storage:/app/storage

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  linkace_db_data:
  linkace_storage: