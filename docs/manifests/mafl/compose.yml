# ===============================
# Docker Compose (Mafl)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  mafl:
    image: hywax/mafl:latest
    container_name: mafl
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    volumes:
      - mafl_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mafl_data: