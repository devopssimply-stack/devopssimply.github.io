# ===============================
# Docker Compose (Postiz)
# ===============================
# host: http://localhost:4007
# username: created on first login
# password: created on first login
# ===============================

services:

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: change-postgres-password
      POSTGRES_DB: postiz
    volumes:
      - postiz_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postiz -d postiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - postiz_redis:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    ports:
      - "4007:5000"
    environment:
      MAIN_URL: http://localhost:4007
      FRONTEND_URL: http://localhost:4007
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4007/api
      BACKEND_INTERNAL_URL: http://localhost:3000

      DATABASE_URL: postgresql://postiz:change-postgres-password@postgres:5432/postiz
      REDIS_URL: redis://redis:6379

      TEMPORAL_ADDRESS: temporal:7233

      JWT_SECRET: change-this-secret

      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads

      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"

    volumes:
      - postiz_uploads:/uploads

  # -----------------------
  # Temporal Stack
  # -----------------------

  temporal-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_postgres:/var/lib/postgresql/data

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: "false"
    volumes:
      - temporal_es:/usr/share/elasticsearch/data

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: unless-stopped
    depends_on:
      - temporal-postgres
      - temporal-elasticsearch
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      ENABLE_ES: "true"
      ES_SEEDS: temporal-elasticsearch
      ES_VERSION: v7
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

volumes:
  postiz_postgres:
  postiz_redis:
  postiz_uploads:
  temporal_postgres:
  temporal_es: