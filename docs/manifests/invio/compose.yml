# ===============================
# Docker Compose (Invio)
# ===============================
# host: http://localhost:8080
# username:
# password:
# ===============================

services:
  invio:
    image: ghcr.io/kittendevv/invio:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5