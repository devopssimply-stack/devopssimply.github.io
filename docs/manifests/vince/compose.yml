# ===============================
# Docker Compose (Vince Analytics)
# ===============================
# host: http://localhost:8080
# username: acme
# password: 1234

services:
  vince:
    image: ghcr.io/vinceanalytics/vince:latest
    container_name: vince
    ports:
      - "8080:8080"
    restart: unless-stopped
    command:
      - serve
      - --adminName
      - acme
      - --adminPassword
      - "1234"
      - --domains
      - vinceanalytics.com
      - --profile
    volumes:
      - vince-data:/vince-data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  vince-data: