# ===============================
# Docker Compose (Pixelfin)
# ===============================
# host: http://localhost:1280
# ===============================

services:
  pixelfin:
    image: ghcr.io/nothing2obvi/pixelfin:latest
    restart: unless-stopped
    ports:
      - "1280:1280"
    environment:
      TZ: "America/Chicago"
    volumes:
      - pixelfin_output:/app/output
      - pixelfin_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:1280/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pixelfin_output:
  pixelfin_data: