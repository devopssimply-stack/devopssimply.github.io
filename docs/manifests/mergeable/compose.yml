# ===============================
# Docker Compose (Mergeable)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  mergeable:
    image: ghcr.io/pvcnt/mergeable:latest
    container_name: mergeable
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - MERGEABLE_GITHUB_URLS=https://api.github.com
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s