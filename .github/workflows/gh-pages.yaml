name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Build with Next.js
        run: bun run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_PLAUSIBLE_PROXY_URL: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_PROXY_URL }}
          NEXT_PUBLIC_SPONSORED_API: ${{ secrets.NEXT_PUBLIC_SPONSORED_API }}
          NEXT_PUBLIC_BACKEND_API: ${{ secrets.NEXT_PUBLIC_BACKEND_API }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_PLAUSIBLE_ANALYTICS_URL: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_ANALYTICS_URL }}
          NEXT_PUBLIC_OG_SERVICE_URL: ${{ secrets.NEXT_PUBLIC_OG_SERVICE_URL }}

      - name: Add .nojekyll file
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
