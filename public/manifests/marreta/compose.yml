# ===============================
# Docker Compose (Marreta)
# ===============================
# host: http://localhost:3000
# username: (created during first setup)
# password: (created during first setup)
# database user: marreta
# database password: marreta

services:
  postgres:
    image: postgres:latest
    container_name: marreta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marreta
      POSTGRES_USER: marreta
      POSTGRES_PASSWORD: marreta
    volumes:
      - marreta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marreta"]
      interval: 10s
      timeout: 5s
      retries: 5

  marreta:
    image: ghcr.io/manualdousuario/marreta:latest
    container_name: marreta
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://marreta:marreta@postgres:5432/marreta
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  marreta_postgres_data: