# ===============================
# Docker Compose (Obskurnee)
# ===============================
# Web: http://localhost:8080
# No default credentials (create on first launch)

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: obskurnee
      POSTGRES_USER: obskurnee
      POSTGRES_PASSWORD: change_this_password
    volumes:
      - obskurnee_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obskurnee -d obskurnee"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  obskurnee:
    image: ghcr.io/zblesk/obskurnee:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://obskurnee:change_this_password@postgres:5432/obskurnee
      SECRET_KEY: replace_with_strong_random_secret
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  obskurnee_postgres: