# ===============================
# Docker Compose (LetterFeed)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  postgres:
    image: postgres:latest
    container_name: letterfeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: letterfeed
      POSTGRES_USER: letterfeed
      POSTGRES_PASSWORD: letterfeed
    volumes:
      - letterfeed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letterfeed"]
      interval: 10s
      timeout: 5s
      retries: 5

  letterfeed:
    image: ghcr.io/leonmuscoden/letterfeed:latest
    container_name: letterfeed
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://letterfeed:letterfeed@postgres:5432/letterfeed
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  letterfeed_postgres_data: