# ===============================
# Docker Compose (HabitSync)
# ===============================
# host: http://localhost:6842
# username: admin
# password: admin

services:
  habitsync:
    image: ghcr.io/jofoerster/habitsync:latest
    container_name: habitsync
    restart: unless-stopped
    ports:
      - "6842:6842"
    environment:
      BASE_URL: http://localhost:6842
      # Basic Auth user: admin / admin
      # BCrypt hash generated for password "admin"
      APP_SECURITY_BASIC-AUTH-USERS_admin: $2y$10$Dow1Qn6mH0YxM9vDOMkMt.VrtI8BGG99nmHn7fO3O5RAwOB1p5MN6
    volumes:
      - habitsync_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6842/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  habitsync_data:
