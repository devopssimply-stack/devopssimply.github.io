# ===============================
# Docker Compose (Meelo)
# ===============================
# host: http://localhost:5000
# username: admin
# password: change_me

services:
  server:
    image: arthichaud/meelo-server:latest
    container_name: meelo-server
    restart: unless-stopped
    init: true
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      mq:
        condition: service_healthy
    environment:
      - TRANSCODER_URL=http://transcoder:7666
      - MEILI_HOST=http://meilisearch:7700
      - RABBITMQ_URL=amqp://meelo:meelo_password@mq:5672
      - DATABASE_URL=postgresql://meelo:meelo_password@db:5432/meelo?schema=public
      - INTERNAL_DATA_DIR=/data
      - INTERNAL_CONFIG_DIR=/config
    volumes:
      - meelo_data:/data
      - meelo_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  scanner:
    image: arthichaud/meelo-scanner:latest
    container_name: meelo-scanner
    restart: unless-stopped
    expose:
      - "8133"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - API_URL=http://server:4000
      - INTERNAL_CONFIG_DIR=/config
      - INTERNAL_DATA_DIR=/data
      - API_KEYS=change_me
    volumes:
      - meelo_data:/data:ro
      - meelo_config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8133 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  matcher:
    image: arthichaud/meelo-matcher:latest
    container_name: meelo-matcher
    restart: unless-stopped
    expose:
      - "6789"
    depends_on:
      server:
        condition: service_healthy
      mq:
        condition: service_healthy
    environment:
      - API_URL=http://server:4000
      - INTERNAL_CONFIG_DIR=/config
      - API_KEYS=change_me
      - RABBITMQ_URL=amqp://meelo:meelo_password@mq:5672
    volumes:
      - meelo_config:/config:ro

  front:
    image: arthichaud/meelo-front:latest
    container_name: meelo-front
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      server:
        condition: service_healthy
      scanner:
        condition: service_healthy
    environment:
      - PUBLIC_SERVER_URL=http://localhost:5000/api
      - SSR_SERVER_URL=http://server:4000
      - PUBLIC_SCANNER_URL=http://localhost:5000/scanner
      - SSR_SCANNER_URL=http://scanner:8133
      - PUBLIC_MATCHER_URL=http://localhost:5000/matcher
      - SSR_MATCHER_URL=http://matcher:6789

  db:
    image: postgres:16-alpine
    container_name: meelo-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=meelo
      - POSTGRES_PASSWORD=meelo_password
      - POSTGRES_DB=meelo
    volumes:
      - meelo_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meelo -d meelo"]
      interval: 5s
      timeout: 5s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: meelo-search
    restart: unless-stopped
    expose:
      - "7700"
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=change_me_master_key
      - MEILI_LOG_LEVEL=WARN
    volumes:
      - meelo_search:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  transcoder:
    image: ghcr.io/zoriya/kyoo_transcoder:latest
    container_name: meelo-transcoder
    restart: unless-stopped
    expose:
      - "7666"
    environment:
      - GOCODER_SAFE_PATH=/data
      - PGUSER=meelo
      - PGPASSWORD=meelo_password
      - PGDATABASE=meelo
      - PGHOST=db
      - PGPORT=5432
    volumes:
      - meelo_data:/data:ro
      - meelo_transcoder_cache:/cache
    depends_on:
      db:
        condition: service_healthy

  mq:
    image: rabbitmq:4.2-alpine
    container_name: meelo-mq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=meelo
      - RABBITMQ_DEFAULT_PASS=meelo_password
    volumes:
      - meelo_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:1.29-alpine
    container_name: meelo-nginx
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONT_URL=http://front:3000
      - SERVER_URL=http://server:4000
      - SCANNER_URL=http://scanner:8133
      - MATCHER_URL=http://matcher:6789
    volumes:
      - meelo_nginx_template:/etc/nginx/templates:ro
    depends_on:
      - server
      - front

volumes:
  meelo_db:
  meelo_data:
  meelo_config:
  meelo_search:
  meelo_transcoder_cache:
  meelo_rabbitmq:
  meelo_nginx_template: