# ===============================
# Docker Compose (Pocket ID)
# ===============================
# host: https://your-pocket-id-domain.com
# username: created during setup
# password: created during setup
# ===============================

services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    ports:
      - "1411:1411"
    environment:
      APP_URL: https://your-pocket-id-domain.com
      ENCRYPTION_KEY: replace-with-generated-key
      TRUST_PROXY: "false"
      MAXMIND_LICENSE_KEY: ""
      PUID: "1000"
      PGID: "1000"
    volumes:
      - pocket_id_data:/app/data
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 90s
      timeout: 5s
      retries: 2
      start_period: 10s

volumes:
  pocket_id_data: