# ===============================
# Docker Compose (MyDrive)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  mydrive:
    image: kylehoell/mydrive:latest
    container_name: mydrive
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URL=mongodb://127.0.0.1:27017/mydrive
      - DB_TYPE=fs
      - PASSWORD_ACCESS=secretaccesspassword
      - PASSWORD_REFRESH=secretrefreshpassword
      - PASSWORD_COOKIE=secretcookiepassword
      - KEY=encryptionkey
      - VIDEO_THUMBNAILS_ENABLED=true
      - TEMP_VIDEO_THUMBNAIL_LIMIT=5000000000
    volumes:
      - mydrive_data:/data
      - mydrive_temp:/temp
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mydrive_data:
  mydrive_temp: