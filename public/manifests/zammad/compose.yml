# ===============================
# Docker Compose (Zammad)
# ===============================
# host: http://localhost:8080
# username: admin@example.com
# password: zammad

services:
  postgresql:
    image: postgres:16-alpine
    container_name: zammad_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "zammad_production"
      POSTGRES_USER: "zammad"
      POSTGRES_PASSWORD: "changeme"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "zammad"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zammad_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  elasticsearch:
    image: bitnami/elasticsearch:8
    container_name: zammad_es
    restart: unless-stopped
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: "false"
    volumes:
      - elasticsearch_data:/bitnami/elasticsearch/data

  zammad:
    image: zammad/zammad-docker-compose:latest
    container_name: zammad_app
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      RAILS_ENV: "production"

      POSTGRESQL_HOST: "postgresql"
      POSTGRESQL_USER: "zammad"
      POSTGRESQL_PASS: "changeme"
      POSTGRESQL_DB: "zammad_production"

      REDIS_URL: "redis://redis:6379"

      ELASTICSEARCH_HOST: "elasticsearch"
    volumes:
      - zammad_storage:/opt/zammad/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgresql_data:
  redis_data:
  elasticsearch_data:
  zammad_storage: