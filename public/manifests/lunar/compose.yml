# ===============================
# Docker Compose (Lunar - Laravel Base)
# ===============================
# host: http://localhost:8000
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: lunar_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: lunar
      POSTGRES_USER: lunar
      POSTGRES_PASSWORD: strongpassword

    volumes:
      - lunar_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunar"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: serversideup/php:8.3-fpm-nginx
    container_name: lunar_app
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8080"

    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: lunar
      DB_USERNAME: lunar
      DB_PASSWORD: strongpassword

    volumes:
      - lunar_app_data:/var/www/html

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  lunar_db_data:
  lunar_app_data: