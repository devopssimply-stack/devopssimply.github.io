# ===============================
# Docker Compose (GitSave)
# ===============================
# host: http://localhost:3000
# username: (defined via UI)
# password: (defined via UI)

services:
  gitsave:
    image: timwitzdam/gitsave:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - gitsave-data:/app/data
      - gitsave-backups:/app/backups
    environment:
      # Required: JWT for session security
      JWT_SECRET: "replace_with_long_random_secret"

      # Required: Encryption secret MUST be 32 characters
      # https://witzdam.com/tools/coding/generator/jwt-secret-generator
      ENCRYPTION_SECRET: "replace_with_32_characters_secret"

      # Optional: disable built-in UI auth (if using external auth)
      # DISABLE_AUTH: "true"

      # Optional Git operation timeout
      # GIT_TIMEOUT: "120000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gitsave-data:
  gitsave-backups:
