# ===============================
# Docker Compose (Raneto)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  raneto:
    image: linuxserver/raneto:latest
    container_name: raneto
    ports:
      - "3000:3000"
    environment:
      TZ: "UTC"
    volumes:
      - raneto_config:/config
      - raneto_content:/config/content
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  raneto_config:
  raneto_content: