# ===============================
# Docker Compose (Mox)
# ===============================
# host: https://mail.example.com
# username: (created during quickstart)
# password:

services:
  mox:
    image: r.xmox.nl/mox:latest
    container_name: mox
    restart: unless-stopped
    network_mode: host
    working_dir: /mox
    environment:
      - MOX_DOCKER=yes
    volumes:
      - mox_config:/mox/config
      - mox_data:/mox/data
      - mox_web:/mox/web
    healthcheck:
      test: ["CMD", "mox", "version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mox_config:
  mox_data:
  mox_web: