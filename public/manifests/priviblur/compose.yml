# ===============================
# Docker Compose (Priviblur)
# ===============================
# host: http://localhost:8000
# username:
# password:

services:

  priviblur:
    image: quay.io/syeopite/priviblur:latest
    container_name: priviblur
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - priviblur_config:/priviblur
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: priviblur-redis
    restart: unless-stopped
    command: redis-server --loglevel warning
    volumes:
      - priviblur_redis:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  priviblur_config:
  priviblur_redis: