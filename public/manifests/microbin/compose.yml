# ===============================
# Docker Compose (MicroBin)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  microbin:
    image: ghcr.io/szabodanika/microbin:latest
    container_name: microbin
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MICROBIN_PORT=8080
      - MICROBIN_PUBLIC_PATH=
      - MICROBIN_QR=true
      - MICROBIN_PRIVATE=true
    volumes:
      - microbin_data:/app/pasta_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  microbin_data: