# ===============================
# Docker Compose (LocalAI)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  localai:
    image: quay.io/go-skynet/local-ai:latest
    container_name: localai
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      - DEBUG=false

    volumes:
      - localai_models:/models

    command: >
      --models-path /models

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  localai_models: