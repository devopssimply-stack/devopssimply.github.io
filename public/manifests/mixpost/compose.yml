# ===============================
# Docker Compose (Mixpost)
# ===============================
# host: http://localhost:8000
# username: (set during installation)
# password:

services:
  mixpost:
    image: inovector/mixpost:latest
    container_name: mixpost
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=mixpost
      - DB_USERNAME=mixpost
      - DB_PASSWORD=mixpost_password
    volumes:
      - mixpost_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    image: postgres:17-alpine
    container_name: mixpost-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mixpost
      - POSTGRES_USER=mixpost
      - POSTGRES_PASSWORD=mixpost_password
    volumes:
      - mixpost_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mixpost -d mixpost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mixpost_storage:
  mixpost_db: