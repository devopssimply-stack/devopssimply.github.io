# ===============================
# Docker Compose (KeePassXC - LSIO)
# ===============================
# host: http://localhost:3000
# username: abc
# password: (set via WEB UI password if configured)

services:
  keepassxc:
    image: lscr.io/linuxserver/keepassxc:latest
    container_name: keepassxc
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - keepassxc_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  keepassxc_config: