# ===============================
# Docker Compose (Positive Chat)
# ===============================
# host: http://localhost:8080
# username:
# password:
# ===============================

services:

  peerjs:
    image: peerjs/peerjs-server:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "443:443"

  chat:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - chat_static:/usr/share/nginx/html
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  chat_static: