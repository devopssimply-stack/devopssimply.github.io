# ===============================
# Docker Compose (Jitsi Meet)
# ===============================
# host: http://localhost:8000
# username:
# password:

services:
  web:
    image: jitsi/web:latest
    container_name: jitsi_web
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      ENABLE_AUTH: "0"
      ENABLE_GUESTS: "1"
      PUBLIC_URL: http://localhost:8000
      XMPP_SERVER: xmpp
      JICOFO_AUTH_USER: focus
      JVB_AUTH_USER: jvb
    depends_on:
      - xmpp
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  xmpp:
    image: jitsi/prosody:latest
    container_name: jitsi_xmpp
    restart: unless-stopped
    environment:
      AUTH_TYPE: internal
      XMPP_DOMAIN: meet.localhost
      XMPP_AUTH_DOMAIN: auth.meet.localhost
      XMPP_MUC_DOMAIN: muc.meet.localhost
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.localhost
      JICOFO_COMPONENT_SECRET: secret
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: focuspass
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: jvbpass
      JVB_COMPONENT_SECRET: jvbsecret
    volumes:
      - jitsi_prosody_config:/config

  jicofo:
    image: jitsi/jicofo:latest
    container_name: jitsi_jicofo
    restart: unless-stopped
    environment:
      XMPP_SERVER: xmpp
      XMPP_DOMAIN: meet.localhost
      XMPP_AUTH_DOMAIN: auth.meet.localhost
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: focuspass
      JVB_BREWERY_MUC: jvbbrewery
    depends_on:
      - xmpp

  jvb:
    image: jitsi/jvb:latest
    container_name: jitsi_jvb
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    environment:
      XMPP_SERVER: xmpp
      XMPP_DOMAIN: meet.localhost
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: jvbpass
      JVB_PORT: 10000
    depends_on:
      - xmpp

volumes:
  jitsi_prosody_config: