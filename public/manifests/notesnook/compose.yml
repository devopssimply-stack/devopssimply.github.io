# ===============================
# Docker Compose (Notesnook)
# ===============================
# App API: http://localhost:5264
# Identity: http://localhost:8264
# SSE: http://localhost:7264
# MinIO: http://localhost:9000
# Monograph: http://localhost:6264
# No default credentials (configure on first launch)

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: >
        bash -c 'echo "try { rs.status() } catch(e) { rs.initiate() }; db.runCommand({ ping: 1 })" |
        mongosh mongodb://localhost:27017 --quiet'
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9090
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  identity:
    image: streetwriters/identity:latest
    restart: unless-stopped
    ports:
      - "8264:8264"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SELF_HOSTED: "1"
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/identity?replSet=rs0
      MONGODB_DATABASE_NAME: identity
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8264/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  sync:
    image: streetwriters/notesnook-sync:latest
    restart: unless-stopped
    ports:
      - "5264:5264"
    depends_on:
      identity:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SELF_HOSTED: "1"
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/?replSet=rs0
      MONGODB_DATABASE_NAME: notesnook
      S3_INTERNAL_SERVICE_URL: http://minio:9000
      S3_INTERNAL_BUCKET_NAME: attachments
      S3_ACCESS_KEY_ID: minioadmin
      S3_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
      S3_BUCKET_NAME: attachments
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5264/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  sse:
    image: streetwriters/sse:latest
    restart: unless-stopped
    ports:
      - "7264:7264"
    depends_on:
      sync:
        condition: service_healthy
    environment:
      SELF_HOSTED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7264/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  monograph:
    image: streetwriters/monograph:latest
    restart: unless-stopped
    ports:
      - "6264:3000"
    depends_on:
      sync:
        condition: service_healthy
    environment:
      API_HOST: http://sync:5264
      PUBLIC_URL: http://localhost:6264
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  minio_data: