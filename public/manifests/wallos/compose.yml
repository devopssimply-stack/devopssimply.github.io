# ===============================
# Docker Compose (Wallos)
# ===============================
# host: http://localhost:8282
# username:
# password:

services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    ports:
      - "8282:80"
    restart: unless-stopped
    environment:
      TZ: America/Toronto
    volumes:
      - wallos-db:/var/www/html/db
      - wallos-logos:/var/www/html/images/uploads/logos

volumes:
  wallos-db:
  wallos-logos: