# ===============================
# Docker Compose (Flame)
# ===============================
# host: http://localhost:5005
# username: (none — single password login)
# password: defined via PASSWORD below

services:
  flame:
    image: pawelmalak/flame:latest
    container_name: flame
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      # Protect access with a custom password
      - PASSWORD=YourStrongFlamePasswordHere
    volumes:
      # persistent UI/bookmarks/editor data
      - flame_data:/app/data
      # optional: access docker socket for auto-detect apps
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5005 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flame_data:
