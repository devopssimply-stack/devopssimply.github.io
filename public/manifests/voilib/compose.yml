# ===============================
# Docker Compose (Voilib)
# ===============================
# host: http://localhost:80
# username:
# password:

services:
  backend:
    image: docker.io/unmonoqueteclea/voilib-backend:3.2.0
    container_name: voilib-backend
    ports:
      - "81:80"
    restart: unless-stopped
    command:
      - uvicorn
      - src.voilib.main:app
      - --reload
      - --host
      - 0.0.0.0
      - --port
      - "80"
    volumes:
      - voilib-data:/data
    healthcheck:
      test: ["CMD","curl","-f","http://localhost/app/version"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    image: docker.io/unmonoqueteclea/voilib-ui:0.6.0
    container_name: voilib-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:5173"
    restart: unless-stopped
    environment:
      VITE_API_PORT: "81"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 20

  management:
    image: docker.io/unmonoqueteclea/voilib-backend:3.2.0
    container_name: voilib-management
    restart: unless-stopped
    ports:
      - "8501:8501"
    entrypoint: ""
    command:
      - streamlit
      - run
      - src/voilib/management/🏠-Home.py
    volumes:
      - voilib-data:/data

  redis:
    image: redis:7-alpine
    container_name: voilib-redis
    restart: unless-stopped
    volumes:
      - voilib-redis-data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    image: docker.io/unmonoqueteclea/voilib-backend:3.2.0
    container_name: voilib-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ""
    command:
      - python
      - src/voilib/worker.py
    volumes:
      - voilib-data:/data

  qdrant:
    image: qdrant/qdrant:v1.1.3
    container_name: voilib-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - voilib-qdrant-data:/qdrant/storage

volumes:
  voilib-data:
  voilib-redis-data:
  voilib-qdrant-data: