# ===============================
# Docker Compose (Gitea)
# ===============================
# host: http://localhost:3000
# username: (create via UI on first launch)
# password: (create via UI on first launch)

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: strong_root_password
      MYSQL_DATABASE: gitea
      MYSQL_USER: gitea
      MYSQL_PASSWORD: strong_gitea_password
    volumes:
      - gitea-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -pstrong_gitea_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  gitea:
    image: gitea/gitea:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      DB_TYPE: mysql
      DB_HOST: db:3306
      DB_NAME: gitea
      DB_USER: gitea
      DB_PASSWD: strong_gitea_password
      APP_NAME: "Gitea"
      ROOT_URL: "http://localhost:3000"
    volumes:
      - gitea-data:/data
    ports:
      - "3000:3000"
      - "222:22"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gitea-db:
  gitea-data:
