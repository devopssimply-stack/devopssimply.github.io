# ===============================
# Docker Compose (Jellystat)
# ===============================
# host: http://localhost:3000
# username: (set during setup)
# password: (set during setup)

services:
  jellystat:
    image: ghcr.io/cyfershepard/jellystat:latest
    container_name: jellystat
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://jellystat:jellystat@db:5432/jellystat
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:latest
    container_name: jellystat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jellystat
      POSTGRES_USER: jellystat
      POSTGRES_PASSWORD: jellystat
    volumes:
      - jellystat_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jellystat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jellystat_db_data: