# ===============================
# Docker Compose (PrestaShop)
# ===============================
# host: http://localhost:8080
# username: admin@example.com
# password: admin_password

services:

  prestashop:
    image: prestashop/prestashop:8.1
    container_name: prestashop
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - DB_SERVER=db
      - DB_NAME=prestashop
      - DB_USER=prestashop
      - DB_PASSWD=change_db_password
      - PS_INSTALL_AUTO=1
      - PS_DOMAIN=localhost:8080
      - ADMIN_MAIL=admin@example.com
      - ADMIN_PASSWD=admin_password
      - PS_DEV_MODE=0
    volumes:
      - prestashop_data:/var/www/html
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  db:
    image: mysql:8.4
    container_name: prestashop-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=prestashop
      - MYSQL_USER=prestashop
      - MYSQL_PASSWORD=change_db_password
      - MYSQL_ROOT_PASSWORD=change_root_password
    volumes:
      - prestashop_db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uprestashop -pchange_db_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  prestashop_data:
  prestashop_db: