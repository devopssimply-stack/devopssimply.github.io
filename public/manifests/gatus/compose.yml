# ===============================
# Docker Compose (Gatus)
# ===============================
# host: http://localhost:8080
# username: (defined in config)
# password: (defined in config)

services:
  gatus:
    image: ghcr.io/twin/gatus:stable
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - gatus-config:/config
      - gatus-data:/data
    environment:
      # Optional: override internal port
      GATUS_PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gatus-config:
  gatus-data:
