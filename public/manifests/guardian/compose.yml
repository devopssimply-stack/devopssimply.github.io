# ===============================
# Docker Compose (Guardian)
# ===============================
# host: http://localhost:3000
# username: configured via app UI
# password: configured via app UI

services:
  backend:
    image: hydroshieldmkii/guardian-backend:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/plex-guard.db
    volumes:
      - guardian-backend-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    image: hydroshieldmkii/guardian-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  guardian-backend-data:
