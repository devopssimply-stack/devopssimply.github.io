# ===============================
# Docker Compose (Infisical)
# ===============================
# host: http://localhost:8080
# username: (created on first setup)
# password: (created on first setup)

services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: change_this_strong_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  infisical:
    image: infisical/infisical:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://infisical:change_this_strong_password@postgres:5432/infisical
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: replace_with_long_random_string
      ENCRYPTION_KEY: replace_with_64_char_hex_key
      SITE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata: