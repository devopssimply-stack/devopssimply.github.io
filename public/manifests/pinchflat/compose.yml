# ===============================
# Docker Compose (Pinchflat)
# ===============================
# host: http://localhost:8945
# username:
# password:

services:
  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat:latest
    restart: unless-stopped
    ports:
      - "8945:8945"
    environment:
      TZ: UTC
    volumes:
      - pinchflat_config:/config
      - pinchflat_downloads:/downloads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8945"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pinchflat_config:
  pinchflat_downloads: