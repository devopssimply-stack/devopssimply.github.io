# ===============================
# Docker Compose (Fireshare)
# ===============================
# host: http://localhost:8080
# username: (none)
# password: defined via ADMIN_PASSWORD below

services:
  fireshare:
    image: shaneisrael/fireshare:latest
    container_name: fireshare
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      # required to secure admin access
      - ADMIN_PASSWORD=YourStrongAdminPasswordHere
      # optional settings
      - ENABLE_TRANSCODING=false
    volumes:
      # database & metadata
      - fireshare_data:/data
      - fireshare_processed:/processed
      # host video directory you want to share
      - ./videos:/videos:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  fireshare_data:
  fireshare_processed:
