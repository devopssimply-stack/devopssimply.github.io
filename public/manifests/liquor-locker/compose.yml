# ===============================
# Docker Compose (Liquor Locker)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: liquor_locker_db
    restart: unless-stopped

    environment:
      - POSTGRES_DB=liquorlocker
      - POSTGRES_USER=liquorlocker
      - POSTGRES_PASSWORD=strongpassword

    volumes:
      - liquor_locker_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liquorlocker"]
      interval: 10s
      timeout: 5s
      retries: 5

  liquor-locker:
    image: ghcr.io/nguyenjessev/liquor-locker:latest
    container_name: liquor-locker
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      - DATABASE_URL=postgresql://liquorlocker:strongpassword@db:5432/liquorlocker

    volumes:
      - liquor_locker_uploads:/app/uploads

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  liquor_locker_db_data:
  liquor_locker_uploads: