# ===============================
# Docker Compose (Repliqate)
# ===============================
# host:
# username:
# password:

services:
  repliqate:
    image: lminlone/repliqate:latest
    container_name: repliqate
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
      - repliqate_backups:/var/repliqate
    healthcheck:
      test: ["CMD","ls","/var/repliqate"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  repliqate_backups: