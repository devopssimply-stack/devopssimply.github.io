# ===============================
# Docker Compose (Radarec)
# ===============================
# host: http://localhost:5000
# username:
# password:

services:
  radarec:
    image: thewicklowwolf/radarec:latest
    container_name: radarec
    ports:
      - "5000:5000"
    volumes:
      - radarec_config:/radarec/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  radarec_config: