# ===============================
# Docker Compose (KitchenOwl)
# ===============================
# host: http://localhost:8080
# username: (set during setup)
# password: (set during setup)

services:
  kitchenowl:
    image: ghcr.io/tombursch/kitchenowl:latest
    container_name: kitchenowl
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://kitchenowl:kitchenowl@db:5432/kitchenowl
      JWT_SECRET: change_this_secret
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:latest
    container_name: kitchenowl_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kitchenowl
      POSTGRES_USER: kitchenowl
      POSTGRES_PASSWORD: kitchenowl
    volumes:
      - kitchenowl_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchenowl"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kitchenowl_db_data: