# ===============================
# Docker Compose (Tracktor)
# ===============================
# host: http://localhost:3333
# username:
# password:

services:
  tracktor:
    image: ghcr.io/javedh-dev/tracktor:latest
    container_name: tracktor
    restart: unless-stopped

    ports:
      - "3333:3000"

    environment:
      TRACKTOR_DEMO_MODE: "false"
      FORCE_DATA_SEED: "false"
      CORS_ORIGINS: http://localhost:3333

    volumes:
      - tracktor_data:/data

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  tracktor_data: