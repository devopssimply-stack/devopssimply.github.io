# ===============================
# Docker Compose (NeoDB)
# ===============================
# host: http://localhost:8000
# username: (created during setup)
# password:

services:
  neodb:
    image: ghcr.io/neodb-social/neodb:latest
    container_name: neodb
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://neodb:neodb_password@db:5432/neodb
      - SECRET_KEY=change_this_secret_key
      - DEBUG=false
    volumes:
      - neodb_media:/app/media
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:17-alpine
    container_name: neodb-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=neodb
      - POSTGRES_USER=neodb
      - POSTGRES_PASSWORD=neodb_password
    volumes:
      - neodb_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neodb -d neodb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  neodb_media:
  neodb_db: