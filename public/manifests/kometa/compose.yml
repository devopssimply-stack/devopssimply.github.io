# ===============================
# Docker Compose (Kometa)
# ===============================
# host: n/a (no web UI)
# username:
# password:

services:
  kometa:
    image: ghcr.io/kometa-team/kometa:latest
    container_name: kometa
    restart: unless-stopped
    volumes:
      - kometa_config:/config
    environment:
      TZ: Etc/UTC
    healthcheck:
      test: ["CMD-SHELL", "test -f /config/config.yml || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  kometa_config: