# ===============================
# Docker Compose (mqttui)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  mqttui:
    image: terdia/mqttui:latest
    container_name: mqttui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MQTTUI_PORT=8080
    volumes:
      - mqttui_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mqttui_data: