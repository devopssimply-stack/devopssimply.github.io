# ===============================
# Docker Compose (Lurker)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  lurker:
    image: ghcr.io/oppiliappan/lurker:latest
    container_name: lurker
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - lurker_data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  lurker_data: