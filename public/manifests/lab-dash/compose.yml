# ===============================
# Docker Compose (Lab Dash)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  lab-dash:
    image: nginx:stable-alpine
    container_name: lab-dash
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - lab_dash_html:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lab_dash_html: