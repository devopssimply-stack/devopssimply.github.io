# ===============================
# Docker Compose (Pulsarr)
# ===============================
# host: http://localhost:3003
# username:
# password:

services:
  pulsarr:
    image: lakker/pulsarr:latest
    container_name: pulsarr
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - pulsarr_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3003/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pulsarr_data: