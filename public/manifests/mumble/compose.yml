# ===============================
# Docker Compose (Mumble Server)
# ===============================
# host: mumble://localhost:64738
# username:
# password:

services:
  mumble:
    image: mumblevoip/mumble-server:latest
    container_name: mumble
    restart: unless-stopped
    ports:
      - "64738:64738/tcp"
      - "64738:64738/udp"
    environment:
      - MUMBLE_SUPERUSER_PASSWORD=change_this_password
    volumes:
      - mumble_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "ss -lntu | grep 64738"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mumble_data: