# ===============================
# Docker Compose (HomeTube)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  hometube:
    image: ghcr.io/egalitarianmonkey/hometube:latest
    container_name: hometube
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=UTC
    volumes:
      - hometube_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  hometube_data: