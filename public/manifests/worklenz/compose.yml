# ===============================
# Docker Compose (Worklenz Full)
# ===============================
# host: http://localhost
# username: (create on first run)
# password: (create on first run)

services:
  postgres:
    image: postgres:16
    container_name: worklenz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "worklenz_db"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "changeme"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: worklenz_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass worklenz_redis_pass
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "worklenz_redis_pass", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: worklenz_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    image: chamikajaycey/worklenz-backend:2.1.6
    container_name: worklenz_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      PORT: "3000"

      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "worklenz_db"
      DB_USER: "postgres"
      DB_PASSWORD: "changeme"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "worklenz_redis_pass"

      SESSION_SECRET: "change_session_secret"
      COOKIE_SECRET: "change_cookie_secret"
      JWT_SECRET: "change_jwt_secret"

      STORAGE_PROVIDER: "s3"
      AWS_BUCKET: "worklenz-bucket"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      S3_URL: "http://minio:9000"

      TZ: "UTC"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/public/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: chamikajaycey/worklenz-frontend:2.1.6
    container_name: worklenz_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: "http://localhost/api"
      VITE_SOCKET_URL: "http://localhost"
      VITE_APP_TITLE: "Worklenz"
      VITE_APP_ENV: "production"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: worklenz_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - nginx_data:/etc/nginx/conf.d
    command: >
      /bin/sh -c "printf 'server {
      listen 80;

      location /api/ {
        proxy_pass http://backend:3000/;
      }

      location / {
        proxy_pass http://frontend:5000;
      }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_logs:
  nginx_data: