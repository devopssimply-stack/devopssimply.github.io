# ===============================
# Docker Compose (Dispatcharr)
# ===============================
# host: http://localhost:9191
# username: (create on first setup)
# password: (create on first setup)

services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    restart: unless-stopped
    ports:
      - "9191:9191"
    environment:
      DISPATCHARR_ENV: aio
      REDIS_HOST: localhost
      CELERY_BROKER_URL: redis://localhost:6379/0
      DISPATCHARR_LOG_LEVEL: info
      # USE_LEGACY_NUMPY: "true"
      # UWSGI_NICE_LEVEL: "-5"
      # CELERY_NICE_LEVEL: "5"
    volumes:
      - dispatcharr_data:/data
    # cap_add:
    #   - SYS_NICE
    # devices:
    #   - /dev/dri:/dev/dri
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  dispatcharr_data:
