# ===============================
# Docker Compose (qbit_manage)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  qbit_manage:
    image: ghcr.io/stuffanthings/qbit_manage:latest
    container_name: qbit_manage
    ports:
      - "8080:8080"
    volumes:
      - qbit_manage_config:/config
      - torrents_data:/data/torrents
      - qbittorrent_config:/qbittorrent:ro
    environment:
      QBT_WEB_SERVER: "true"
      QBT_PORT: "8080"

      QBT_RUN: "false"
      QBT_SCHEDULE: "1440"
      QBT_CONFIG_DIR: "/config"
      QBT_LOGFILE: "qbit_manage.log"

      QBT_RECHECK: "false"
      QBT_CAT_UPDATE: "false"
      QBT_TAG_UPDATE: "false"
      QBT_REM_UNREGISTERED: "false"
      QBT_REM_ORPHANED: "false"
      QBT_TAG_TRACKER_ERROR: "false"
      QBT_TAG_NOHARDLINKS: "false"
      QBT_SHARE_LIMITS: "false"
      QBT_SKIP_CLEANUP: "false"
      QBT_DRY_RUN: "false"
      QBT_STARTUP_DELAY: "0"
      QBT_SKIP_QB_VERSION_CHECK: "false"
      QBT_DEBUG: "false"
      QBT_TRACE: "false"

      QBT_LOG_LEVEL: "INFO"
      QBT_LOG_SIZE: "10"
      QBT_LOG_COUNT: "5"
      QBT_DIVIDER: "=="
      QBT_WIDTH: "100"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    restart: unless-stopped

volumes:
  qbit_manage_config:
  torrents_data:
  qbittorrent_config: