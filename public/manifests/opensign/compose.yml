# ===============================
# Docker Compose (OpenSign)
# ===============================
# host: https://localhost
# username:
# password:
# ===============================

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 5s
      retries: 5

  server:
    image: opensign/opensignserver:main
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - opensign_files:/usr/src/app/files
    environment:
      NODE_ENV: production
      SERVER_URL: https://localhost/api/app
      PUBLIC_URL: https://localhost
      MONGO_URL: mongodb://mongo:27017/opensign
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  client:
    image: opensign/opensign:main
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SERVER_URL: https://localhost/api/app

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mongo_data:
  opensign_files:
  caddy_data:
  caddy_config: