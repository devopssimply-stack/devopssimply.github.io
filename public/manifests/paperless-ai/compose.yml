# ===============================
# Docker Compose (Paperless-AI)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  paperless-ai:
    image: clusterzx/paperless-ai:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - paperless_ai_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  paperless_ai_data: