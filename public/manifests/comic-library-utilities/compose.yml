services:
  comic-utils:
    image: allaboutduncan/comic-utils-web:latest
    container_name: comic-utils
    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    ports:
      - "5577:5577"

    volumes:
      # Required – do not change
      - /var/run/docker.sock:/tmp/docker.sock:ro

      # App configuration
      - ./config:/config

      # Comic library (MUST be /data)
      - /e/Comics:/data

      # Optional downloads folder (for monitoring)
      - /f/downloads:/downloads

      # Cache (DB + thumbnails)
      - ./cache:/cache

    environment:
      FLASK_ENV: production

      # Folder monitoring
      MONITOR: "yes"   # yes | no

      # Permissions (recommended)
      # PUID: 1000
      # PGID: 1000
      # UMASK: 022

      # GCD MySQL (optional)
      # GCD_MYSQL_HOST: mysql-gcd
      # GCD_MYSQL_PORT: 3306
      # GCD_MYSQL_DATABASE: gcd_data
      # GCD_MYSQL_USER: clu
      # GCD_MYSQL_PASSWORD: strong-password
