# ===============================
# Docker Compose (Profilarr)
# ===============================
# host: http://localhost:6868
# username:
# password:

services:

  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    restart: unless-stopped
    ports:
      - "6868:6868"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - PARSER_HOST=parser
      - PARSER_PORT=5000
    volumes:
      - profilarr_config:/config
    depends_on:
      parser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:6868/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    container_name: profilarr-parser
    restart: unless-stopped
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  profilarr_config: