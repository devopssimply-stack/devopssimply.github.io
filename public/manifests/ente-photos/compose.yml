# ===============================
# Docker Compose (Ente Full Stack)
# ===============================
# API:     http://localhost:8080
# Auth:    http://localhost/auth
# Photos:  http://localhost/photos

services:
  postgres:
    image: postgres:16-alpine
    container_name: ente-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ente
      POSTGRES_USER: ente
      POSTGRES_PASSWORD: ente_password
    volumes:
      - ente_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ente"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ente-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ente
      MINIO_ROOT_PASSWORD: ente_storage_password
    volumes:
      - ente_minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  ente-server:
    image: ghcr.io/ente-io/server:latest
    container_name: ente-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      BASE_URL: http://localhost:8080

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ente
      DB_USER: ente
      DB_PASSWORD: ente_password

      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ente
      S3_ACCESS_KEY: ente
      S3_SECRET_KEY: ente_storage_password

      JWT_SECRET: super_long_jwt_secret_change_me
      ENCRYPTION_KEY: super_long_encryption_key_change_me

    ports:
      - "8080:8080"

  ente-auth:
    image: ghcr.io/ente-io/web-auth:latest
    container_name: ente-auth
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api

  ente-photos:
    image: ghcr.io/ente-io/web-photos:latest
    container_name: ente-photos
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api

  nginx:
    image: nginx:1.25-alpine
    container_name: ente-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ente-server
      - ente-auth
      - ente-photos
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  ente_pg:
  ente_minio:
