# ===============================
# Docker Compose (WeddingShare)
# ===============================
# host: http://localhost:8080
# username: admin
# password: admin

services:
  wedding-share:
    image: cirx08/wedding_share:latest
    container_name: wedding-share
    restart: unless-stopped
    ports:
      - "8080:5000"
    environment:
      TITLE: "WeddingShare"
      ACCOUNT_OWNER_USERNAME: "admin"
      ACCOUNT_OWNER_PASSWORD: "admin"
      DATABASE_TYPE: "sqlite"
      ENCRYPTION_KEY: "ChangeMe"
      ENCRYPTION_SALT: "ChangeMe"
    volumes:
      - config_data:/app/config
      - thumbnails_data:/app/wwwroot/thumbnails
      - uploads_data:/app/wwwroot/uploads
      - custom_resources_data:/app/wwwroot/custom_resources
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  config_data:
  thumbnails_data:
  uploads_data:
  custom_resources_data: