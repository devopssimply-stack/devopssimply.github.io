# ===============================
# Docker Compose (PhotoView)
# ===============================
# host: http://localhost:8000
# username:
# password:

services:

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: photoview
      MARIADB_USER: photoview
      MARIADB_PASSWORD: change_this_password
      MARIADB_ROOT_PASSWORD: change_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  photoview:
    image: photoview/photoview:2
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8000:80"
    environment:
      PHOTOVIEW_DATABASE_DRIVER: mysql
      PHOTOVIEW_MYSQL_URL: photoview:change_this_password@tcp(mariadb)/photoview
      PHOTOVIEW_LISTEN_IP: 0.0.0.0
    volumes:
      - photoview_cache:/home/photoview/media-cache
      - photoview_photos:/photos:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  photoview_cache:
  photoview_photos: