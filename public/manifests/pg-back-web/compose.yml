# ===============================
# Docker Compose (PgBackWeb)
# ===============================
# host: http://localhost:8085
# username:
# password:

services:

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: pgbackweb
      POSTGRES_PASSWORD: change_this_password
      POSTGRES_DB: pgbackweb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgbackweb -d pgbackweb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbackweb:
    image: eduardolat/pgbackweb:latest
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PBW_ENCRYPTION_KEY: change_this_secret_key
      PBW_POSTGRES_CONN_STRING: postgresql://pgbackweb:change_this_password@postgres:5432/pgbackweb?sslmode=disable
    volumes:
      - pgbackweb_backups:/backups
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  pgbackweb_backups: