# ===============================
# Docker Compose (Gameyfin)
# ===============================
# host: http://localhost:8080
# username/password: created via web UI
# purpose: view and download your video game library

services:
  gameyfin:
    image: ghcr.io/gameyfin/gameyfin:latest
    container_name: gameyfin
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Base URL (adjust for reverse proxy / real domain)
      - SERVER_PORT=8080
      - JAVA_OPTS=-Xmx1G
      # Path(s) inside container where your games are mounted:
      # specify comma-separated absolute container paths if multiple
      - GAMEYFIN_SOURCES=/library
    volumes:
      # Mount your game library root here:
      - /path/to/your/games:/library:ro
      # Persist application state & cache
      - gameyfin_data:/opt/gameyfin/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gameyfin_data:
