# ===============================
# Docker Compose (Ombi)
# ===============================
# Web: http://localhost:3579
# No default credentials (create admin on first setup)

services:
  ombi:
    image: lscr.io/linuxserver/ombi:latest
    restart: unless-stopped
    ports:
      - "3579:3579"

    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC

    volumes:
      - ombi_config:/config

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3579 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  ombi_config: