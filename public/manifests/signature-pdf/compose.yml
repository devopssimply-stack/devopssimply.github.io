# ===============================
# Docker Compose (SignaturePDF)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  signaturepdf:
    image: signaturepdf
    container_name: signaturepdf
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      SERVERNAME: pdf.example.org
      UPLOAD_MAX_FILESIZE: 48M
      POST_MAX_SIZE: 48M
      MAX_FILE_UPLOADS: "401"
      PDF_STORAGE_PATH: /data
    volumes:
      - signaturepdf_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  signaturepdf_data: