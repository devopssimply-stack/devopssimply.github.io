version: "3.9"

services:
  answer:
    image: apache/answer:latest
    container_name: apache-answer
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - answer-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true

volumes:
  answer-data:
    name: answer-data
