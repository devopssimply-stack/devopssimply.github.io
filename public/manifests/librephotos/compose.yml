# ===============================
# Docker Compose (LibrePhotos)
# ===============================
# host: http://localhost:3000
# username: (created on first login)
# password:

services:
  postgres:
    image: postgres:latest
    container_name: librephotos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: librephotos
      POSTGRES_USER: librephotos
      POSTGRES_PASSWORD: librephotos
    volumes:
      - librephotos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U librephotos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: librephotos-redis
    restart: unless-stopped
    volumes:
      - librephotos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  librephotos:
    image: librephotos/librephotos:latest
    container_name: librephotos
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: replace_with_random_string
      DB_HOST: postgres
      DB_NAME: librephotos
      DB_USER: librephotos
      DB_PASS: librephotos
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost
    volumes:
      - librephotos_media:/data
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  librephotos_postgres_data:
  librephotos_redis_data:
  librephotos_media: