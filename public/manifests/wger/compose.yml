# ===============================
# Docker Compose (Wger)
# ===============================
# host: http://localhost:8080
# username: admin (create on first run)
# password: (set during setup)

services:
  web:
    image: docker.io/wger/server:latest
    container_name: wger_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      SECRET_KEY: "changeme"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "wger"
      DB_USER: "wger"
      DB_PASSWORD: "wger"
      DB_HOST: "db"
      DB_PORT: "5432"
      CACHE_BACKEND: "redis://cache:6379/1"
      ALLOWED_HOSTS: "*"
    volumes:
      - static_data:/home/wger/static
      - media_data:/home/wger/media
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:stable
    container_name: wger_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - static_data:/wger/static:ro
      - media_data:/wger/media:ro
    command: >
      /bin/sh -c "printf 'server { listen 80;
      location / { proxy_pass http://web:8000; }
      location /static/ { alias /wger/static/; }
      location /media/ { alias /wger/media/; }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16
    container_name: wger_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "wger"
      POSTGRES_USER: "wger"
      POSTGRES_PASSWORD: "wger"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wger"]
      interval: 30s
      timeout: 10s
      retries: 5

  cache:
    image: redis:7
    container_name: wger_cache
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery_worker:
    image: docker.io/wger/server:latest
    container_name: wger_worker
    restart: unless-stopped
    command: /start-worker
    depends_on:
      web:
        condition: service_healthy
    environment:
      SECRET_KEY: "changeme"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "wger"
      DB_USER: "wger"
      DB_PASSWORD: "wger"
      DB_HOST: "db"
      DB_PORT: "5432"
      CACHE_BACKEND: "redis://cache:6379/1"
    volumes:
      - media_data:/home/wger/media

  celery_beat:
    image: docker.io/wger/server:latest
    container_name: wger_beat
    restart: unless-stopped
    command: /start-beat
    depends_on:
      celery_worker:
        condition: service_started
    environment:
      SECRET_KEY: "changeme"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "wger"
      DB_USER: "wger"
      DB_PASSWORD: "wger"
      DB_HOST: "db"
      DB_PORT: "5432"
    volumes:
      - celery_beat:/home/wger/beat

volumes:
  postgres_data:
  redis_data:
  celery_beat:
  static_data:
  media_data: