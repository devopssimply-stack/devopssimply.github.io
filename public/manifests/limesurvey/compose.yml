# ===============================
# Docker Compose (LimeSurvey)
# ===============================
# host: http://localhost:8080
# username: admin
# password: admin

services:
  db:
    image: postgres:16
    container_name: limesurvey_db
    restart: unless-stopped

    environment:
      - POSTGRES_DB=limesurvey
      - POSTGRES_USER=limesurvey
      - POSTGRES_PASSWORD=strongpassword

    volumes:
      - limesurvey_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limesurvey"]
      interval: 10s
      timeout: 5s
      retries: 5

  limesurvey:
    image: limesurvey/limesurvey:latest
    container_name: limesurvey
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8080:80"

    environment:
      - DB_TYPE=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=limesurvey
      - DB_USERNAME=limesurvey
      - DB_PASSWORD=strongpassword

    volumes:
      - limesurvey_uploads:/var/www/html/upload
      - limesurvey_plugins:/var/www/html/plugins

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  limesurvey_db_data:
  limesurvey_uploads:
  limesurvey_plugins: