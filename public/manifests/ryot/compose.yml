# ===============================
# Docker Compose (Ryot)
# ===============================
# host: http://localhost:8000
# username:
# password:

services:

  ryot-db:
    image: postgres:17-alpine
    container_name: ryot-db
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - ryot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready","-U","postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  ryot:
    image: ignisda/ryot:v10
    container_name: ryot
    ports:
      - "8000:8000"
    environment:
      SERVER_ADMIN_ACCESS_TOKEN: "replace_with_long_random_token"
      DATABASE_URL: "postgres://postgres:postgres@ryot-db:5432/postgres"
    depends_on:
      ryot-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped


volumes:
  ryot_postgres_data: