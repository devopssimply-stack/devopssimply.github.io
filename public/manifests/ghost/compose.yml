# ===============================
# Docker Compose (Ghost)
# ===============================
# host: http://localhost:2368
# username: (create via Ghost admin UI)
# password: (create via Ghost admin UI)

services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ghost
    volumes:
      - ghost-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -pghost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ghost:
    image: ghost:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      url: "http://localhost:2368"
      database__client: mysql
      database__connection__host: mysql
      database__connection__user: ghost
      database__connection__password: ghost
      database__connection__database: ghost
    ports:
      - "2368:2368"
    volumes:
      - ghost-content:/var/lib/ghost/content
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2368/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ghost-mysql:
  ghost-content:
