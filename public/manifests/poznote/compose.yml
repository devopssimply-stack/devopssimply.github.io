# ===============================
# Docker Compose (Poznote)
# ===============================
# Web UI: http://localhost:8085
# MCP Server: http://localhost:8045
# username: admin
# password: admin
# ===============================

services:

  poznote:
    image: ghcr.io/timothepoznanski/poznote:4
    restart: unless-stopped
    environment:
      SQLITE_DATABASE: /var/www/html/data/database/poznote.db
    ports:
      - "8085:80"
    volumes:
      - poznote_data:/var/www/html/data
    healthcheck:
      test: ["CMD-SHELL","wget -q --spider http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  poznote-mcp:
    image: ghcr.io/timothepoznanski/poznote-mcp:4
    restart: unless-stopped
    depends_on:
      - poznote
    environment:
      POZNOTE_API_URL: http://poznote/api/v1
      POZNOTE_USERNAME: admin
      POZNOTE_PASSWORD: admin
      POZNOTE_USER_ID: 1
      POZNOTE_DEFAULT_WORKSPACE: Poznote
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8045
      POZNOTE_DEBUG: "false"
    ports:
      - "8045:8045"
    healthcheck:
      test: ["CMD-SHELL","wget -q --spider http://127.0.0.1:8045 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  poznote_data: