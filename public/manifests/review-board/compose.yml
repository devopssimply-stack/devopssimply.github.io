# ===============================
# Docker Compose (Review Board)
# ===============================
# host: http://localhost:8080
# username: admin
# password: created during setup

services:

  reviewboard:
    image: beanbag/reviewboard:latest
    container_name: reviewboard
    ports:
      - "8080:8080"
    environment:
      DATABASE_ENGINE: "postgresql"
      DATABASE_NAME: "reviewboard"
      DATABASE_USER: "reviewboard"
      DATABASE_PASSWORD: "reviewboard"
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      CACHE_TYPE: "redis"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    volumes:
      - reviewboard_data:/var/lib/reviewboard
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  postgres:
    image: postgres:16-alpine
    container_name: reviewboard-postgres
    environment:
      POSTGRES_DB: "reviewboard"
      POSTGRES_USER: "reviewboard"
      POSTGRES_PASSWORD: "reviewboard"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - reviewboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready","-U","reviewboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    container_name: reviewboard-redis
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - reviewboard_redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped


volumes:
  reviewboard_data:
  reviewboard_postgres_data:
  reviewboard_redis_data: