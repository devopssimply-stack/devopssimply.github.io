# ===============================
# Docker Compose (Shinobi)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  shinobi:
    image: registry.gitlab.com/shinobi-systems/shinobi:dev
    container_name: shinobi
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "21:21"
    mem_limit: 2g
    volumes:
      - shinobi_database:/var/lib/mysql
      - shinobi_data:/home/Shinobi

volumes:
  shinobi_database:
  shinobi_data: