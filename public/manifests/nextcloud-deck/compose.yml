# ===============================
# Docker Compose (Nextcloud + Deck)
# ===============================
# host: http://localhost:8080
# username: admin
# password: change_admin_password

services:
  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_password
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=change_admin_password
    volumes:
      - nextcloud_data:/var/www/html
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost/status.php"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    image: postgres:17-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_password
    volumes:
      - nextcloud_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  nextcloud_data:
  nextcloud_db: