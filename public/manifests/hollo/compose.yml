# ===============================
# Docker Compose (Hollo)
# ===============================
# host: http://localhost:3000
# username: (created during setup)
# password: (created during setup)

services:
  db:
    image: postgres:16-alpine
    container_name: hollo_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=hollo
      - POSTGRES_USER=hollo
      - POSTGRES_PASSWORD=hollo_change_me
    volumes:
      - hollo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hollo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hollo_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - hollo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hollo:
    image: ghcr.io/fedify-dev/hollo:latest
    container_name: hollo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://hollo:hollo_change_me@db:5432/hollo
      - REDIS_URL=redis://redis:6379
      - BASE_URL=http://localhost:3000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  hollo_db_data:
  hollo_redis_data:
