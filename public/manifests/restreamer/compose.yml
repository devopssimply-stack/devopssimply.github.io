# ===============================
# Docker Compose (Restreamer)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  restreamer:
    image: datarhei/restreamer:latest
    container_name: restreamer
    ports:
      - "8080:8080"
      - "8181:8181"
      - "1935:1935"
      - "1936:1936"
      - "6000:6000/udp"
    volumes:
      - restreamer_config:/core/config
      - restreamer_data:/core/data
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  restreamer_config:
  restreamer_data: