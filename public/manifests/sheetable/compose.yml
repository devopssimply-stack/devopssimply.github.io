# ===============================
# Docker Compose (Sheetable)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  sheetable:
    image: vallezw/sheetable:latest
    container_name: sheetable
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      CONFIG_PATH: /app/config/

    volumes:
      - sheetable_config:/app/config

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sheetable_config: