# ===============================
# Docker Compose (Standard Notes)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  server:
    image: standardnotes/server:latest
    container_name: standardnotes-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
      - "3125:3104"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USERNAME: std_notes_user
      DB_PASSWORD: changeme123
      DB_DATABASE: standard_notes_db
      DB_TYPE: mysql

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_TYPE: redis

      AUTH_JWT_SECRET: replace_with_jwt_secret
      AUTH_SERVER_ENCRYPTION_SERVER_KEY: replace_with_encryption_key
      VALET_TOKEN_SECRET: replace_with_valet_secret
    volumes:
      - standardnotes_logs:/var/lib/server/logs
      - standardnotes_uploads:/opt/server/packages/files/dist/uploads
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: standardnotes-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: standard_notes_db
      MYSQL_USER: std_notes_user
      MYSQL_PASSWORD: changeme123
      MYSQL_ROOT_PASSWORD: changeme123
    volumes:
      - standardnotes_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: standardnotes-redis
    restart: unless-stopped
    volumes:
      - standardnotes_redis:/data

volumes:
  standardnotes_logs:
  standardnotes_uploads:
  standardnotes_mysql:
  standardnotes_redis: