# ===============================
# Docker Compose (Moodle)
# ===============================
# host: http://localhost:8080
# username: (created during setup)
# password:

services:
  moodle:
    image: moodlehq/moodle-php-apache:latest
    container_name: moodle
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - MOODLE_DATABASE_TYPE=pgsql
      - MOODLE_DATABASE_HOST=db
      - MOODLE_DATABASE_PORT_NUMBER=5432
      - MOODLE_DATABASE_USER=moodle
      - MOODLE_DATABASE_PASSWORD=moodle_password
      - MOODLE_DATABASE_NAME=moodle
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=admin_password
      - MOODLE_EMAIL=admin@example.com
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  db:
    image: postgres:17-alpine
    container_name: moodle-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=moodle
      - POSTGRES_USER=moodle
      - POSTGRES_PASSWORD=moodle_password
    volumes:
      - moodle_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodle -d moodle"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  moodle_data:
  moodledata_data:
  moodle_db: