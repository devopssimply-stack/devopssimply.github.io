# ===============================
# Docker Compose (FileBrowser - gtstef)
# ===============================
# host: http://localhost:8080
# username: defined inside config.yaml
# password: defined inside config.yaml

services:
  filebrowser:
    image: gtstef/filebrowser:stable
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Directory you want to expose/manage
      - filebrowser_data:/folder
      # Read-only application configuration
      - filebrowser_config:/home/filebrowser
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  filebrowser_data:
  filebrowser_config:
