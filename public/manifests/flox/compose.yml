# ===============================
# Docker Compose (Flox)
# ===============================
# host: http://localhost:8080
# admin username: set via env FLOX_ADMIN_USER
# admin password: set via env FLOX_ADMIN_PASS

services:
  db:
    image: mariadb:10.11
    container_name: flox_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=YourRootPasswordHere
      - MYSQL_DATABASE=flox
      - MYSQL_USER=flox
      - MYSQL_PASSWORD=YourFloxDbPass
    volumes:
      - flox_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

  flox_app:
    image: mwalbeck/flox:latest
    container_name: flox_app
    restart: unless-stopped
    environment:
      # Database config
      - FLOX_DB_INIT=true
      - FLOX_DB_CONNECTION=mysql
      - FLOX_DB_HOST=db
      - FLOX_DB_NAME=flox
      - FLOX_DB_USER=flox
      - FLOX_DB_PASS=YourFloxDbPass
      - FLOX_ADMIN_USER=admin
      - FLOX_ADMIN_PASS=admin_password_here
      - FLOX_APP_URL=http://localhost:8080
    volumes:
      - flox_code:/var/www/flox
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: nginx:stable
    container_name: flox_web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      flox_app:
        condition: service_healthy
    volumes:
      - flox_code:/var/www/flox:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  flox_db_data:
  flox_code:


### Save as nginx.conf
server {
    listen 80;
    server_name _;
    root /var/www/flox/public;

    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass flox_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
