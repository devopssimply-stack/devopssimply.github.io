# ===============================
# Docker Compose (Nginx Proxy Manager)
# ===============================
# host: http://localhost:81
# username: admin@example.com
# password: changeme

services:
  app:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped

    environment:
      TZ: Australia/Brisbane

    ports:
      - "80:80"
      - "81:81"
      - "443:443"

    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:81 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  npm_data:
  npm_letsencrypt: