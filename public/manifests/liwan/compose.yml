# ===============================
# Docker Compose (Liwan)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: liwan_db
    restart: unless-stopped

    environment:
      - POSTGRES_DB=liwan
      - POSTGRES_USER=liwan
      - POSTGRES_PASSWORD=strongpassword

    volumes:
      - liwan_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liwan"]
      interval: 10s
      timeout: 5s
      retries: 5

  liwan:
    image: ghcr.io/explodingcamera/liwan:latest
    container_name: liwan
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      - DATABASE_URL=postgresql://liwan:strongpassword@db:5432/liwan
      - NODE_ENV=production

    volumes:
      - liwan_data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  liwan_db_data:
  liwan_data: