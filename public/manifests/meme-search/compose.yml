# ===============================
# Docker Compose (Meme Search Stack)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  meme_search:
    image: ghcr.io/neonwatty/meme_search:latest
    container_name: meme-search
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@meme-search-db:5432/meme_search
    depends_on:
      meme_search_db:
        condition: service_healthy
    volumes:
      - meme_memes:/rails/public/memes
      - meme_direct_uploads:/rails/public/memes/direct-uploads

  image_to_text_generator:
    image: ghcr.io/neonwatty/image_to_text_generator:latest
    container_name: image-to-text-generator
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - APP_PORT=3000
      - GEN_URL=http://meme-search:3000
    volumes:
      - meme_memes:/app/public/memes
      - meme_direct_uploads:/app/public/memes/direct-uploads
      - generator_db:/app/db
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      meme_search:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 12G

  meme_search_db:
    image: pgvector/pgvector:pg17
    container_name: meme-search-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=meme_search
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - meme_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meme_search"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meme_postgres_data:
  meme_memes:
  meme_direct_uploads:
  generator_db:
  huggingface_cache: