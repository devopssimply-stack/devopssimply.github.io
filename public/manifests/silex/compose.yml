# ===============================
# Docker Compose (Silex)
# ===============================
# host: http://localhost:6805
# username:
# password:

services:
  silex:
    image: silexlabs/silex:latest
    container_name: silex
    restart: unless-stopped
    ports:
      - "6805:6805"
    volumes:
      - silex_storage:/silex/silex/storage
      - silex_hosting:/silex/silex/hosting
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6805"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  silex_storage:
  silex_hosting: