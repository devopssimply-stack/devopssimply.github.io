# ===============================
# Docker Compose (Pangolin Tunnel)
# ===============================
# host: http://localhost
# username:
# password:

services:

  pangolin:
    image: fosrl/pangolin:latest
    restart: unless-stopped
    volumes:
      - pangolin_config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: 5s
      timeout: 5s
      retries: 15

  gerbil:
    image: fosrl/gerbil:latest
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - pangolin_config:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
      - "21820:21820/udp"
      - "443:443"
      - "80:80"

  traefik:
    image: traefik:v3
    restart: unless-stopped
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - traefik_config:/etc/traefik:ro
      - traefik_letsencrypt:/letsencrypt

volumes:
  pangolin_config:
  traefik_config:
  traefik_letsencrypt: