# ===============================
# Docker Compose (SolidInvoice)
# ===============================
# host: http://localhost:8765
# username:
# password:

services:
  solidinvoice:
    image: solidinvoice/solidinvoice:latest
    container_name: solidinvoice
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8765:8765"
    volumes:
      - solidinvoice_data:/etc/solidinvoice

  mysql:
    image: mysql:8.0
    container_name: solidinvoice-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: solidinvoice
      MYSQL_ALLOW_EMPTY_PASSWORD: "1"
    volumes:
      - solidinvoice_db:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  solidinvoice_db:
  solidinvoice_data: