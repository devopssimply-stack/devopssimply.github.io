# ===============================
# Docker Compose (OpenProject)
# ===============================
# host: http://localhost:8080
# username: admin
# password: admin (change on first login)
# ===============================

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: openproject
      POSTGRES_USER: openproject
      POSTGRES_PASSWORD: openproject
    volumes:
      - openproject_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openproject -d openproject"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: memcached:1.6-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "echo stats | nc 127.0.0.1 11211"]
      interval: 30s
      timeout: 5s
      retries: 5

  openproject:
    image: openproject/community:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://openproject:openproject@db:5432/openproject
      OPENPROJECT_CACHE__MEMCACHE__SERVER: cache:11211
      OPENPROJECT_SECRET_KEY_BASE: change-this-to-a-long-random-string
    volumes:
      - openproject_assets:/var/openproject/assets
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health_checks/default"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  openproject_pgdata:
  openproject_assets: