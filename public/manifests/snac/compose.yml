# ===============================
# Docker Compose (SNAC)
# ===============================
# host: http://localhost:8001
# username:
# password:

services:
  snac:
    image: b00bl1k/snac2:latest
    container_name: snac
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - snac_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8001"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  snac_data: