# ===============================
# Docker Compose (Localess)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  db:
    image: postgres:16
    container_name: localess_db
    restart: unless-stopped

    environment:
      - POSTGRES_DB=localess
      - POSTGRES_USER=localess
      - POSTGRES_PASSWORD=strongpassword

    volumes:
      - localess_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localess"]
      interval: 10s
      timeout: 5s
      retries: 5

  localess:
    image: ghcr.io/lessify/localess:latest
    container_name: localess
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      - DATABASE_URL=postgresql://localess:strongpassword@db:5432/localess
      - NODE_ENV=production

    volumes:
      - localess_data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  localess_db_data:
  localess_data: