# ===============================
# Docker Compose (Shiori)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  shiori:
    image: ghcr.io/go-shiori/shiori:latest
    container_name: shiori
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SHIORI_DIR: /srv/shiori
      SHIORI_DATABASE_URL: postgres://shiori:shiori@postgres:5432/shiori?sslmode=disable
    volumes:
      - shiori_data:/srv/shiori
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: shiori-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shiori
      POSTGRES_USER: shiori
      POSTGRES_PASSWORD: shiori
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiori"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  shiori_data:
  postgres_data: