# ===============================
# Docker Compose (Notifiarr)
# ===============================
# host: http://localhost:5454
# username: configured inside app
# password: configured inside app

services:
  notifiarr:
    image: golift/notifiarr:latest
    restart: unless-stopped

    ports:
      - "5454:5454"

    volumes:
      - notifiarr_config:/config
      - /var/run/utmp:/var/run/utmp:ro
      - /etc/machine-id:/etc/machine-id:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5454 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M

volumes:
  notifiarr_config: