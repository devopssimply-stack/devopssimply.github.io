# ===============================
# Docker Compose (Penpot)
# ===============================
# host: http://localhost:9001
# username:
# password:

services:

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: change_this_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot -d penpot"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    command: valkey-server --maxmemory 128mb --maxmemory-policy volatile-lfu
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: penpotapp/backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      PENPOT_SECRET_KEY: change_this_secret_key
      PENPOT_PUBLIC_URI: http://localhost:9001

      PENPOT_DATABASE_URI: postgresql://postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: change_this_password

      PENPOT_REDIS_URI: redis://valkey/0

      PENPOT_OBJECTS_STORAGE_BACKEND: fs
      PENPOT_OBJECTS_STORAGE_FS_DIRECTORY: /opt/data/assets

      PENPOT_TELEMETRY_ENABLED: true
      PENPOT_TELEMETRY_REFERER: compose

      PENPOT_SMTP_DEFAULT_FROM: no-reply@example.com
      PENPOT_SMTP_HOST: localhost
      PENPOT_SMTP_PORT: 25

    volumes:
      - penpot_assets:/opt/data/assets

  exporter:
    image: penpotapp/exporter:latest
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      PENPOT_SECRET_KEY: change_this_secret_key
      PENPOT_PUBLIC_URI: http://backend:6060
      PENPOT_REDIS_URI: redis://valkey/0

  frontend:
    image: penpotapp/frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      exporter:
        condition: service_started
    ports:
      - "9001:8080"
    volumes:
      - penpot_assets:/opt/data/assets
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  penpot_assets: