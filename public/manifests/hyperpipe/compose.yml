# ===============================
# Docker Compose (Hyperpipe)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  hyperpipe:
    image: ghcr.io/hyperpipe/hyperpipe:latest
    container_name: hyperpipe
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - TZ=UTC
    volumes:
      - hyperpipe_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  hyperpipe_data: