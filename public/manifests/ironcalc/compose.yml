# ===============================
# Docker Compose (IronCalc Server)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  ironcalc:
    image: ghcr.io/ironcalc/ironcalc-server:latest
    container_name: ironcalc_server
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5