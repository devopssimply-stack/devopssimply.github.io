# ===============================
# Docker Compose (mkcertWeb)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  mkcertweb:
    image: ghcr.io/jeffcaldwellca/mkcertweb:latest
    container_name: mkcertweb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - mkcertweb_data:/app/data
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mkcertweb_data: