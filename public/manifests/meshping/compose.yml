# ===============================
# Docker Compose (MeshPing)
# ===============================
# host: http://localhost:9922
# username:
# password:

services:
  meshping:
    image: svedrin/meshping:latest
    container_name: meshping
    restart: unless-stopped
    ports:
      - "9922:9922"
    environment:
      - MESHPING_PORT=9922
      # Optional:
      # - MESHPING_PEERS=10.10.10.1:9922,10.10.20.1:9922
    volumes:
      - meshping_data:/opt/meshping/db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:9922/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  meshping_data: