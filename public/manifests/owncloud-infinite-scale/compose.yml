# ===============================
# Docker Compose (ownCloud OCIS)
# ===============================
# host: https://localhost:9200
# username: admin
# password: admin (shown on first start)
# ===============================

services:
  ocis:
    image: owncloud/ocis:latest
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      OCIS_INSECURE: "true"
      PROXY_HTTP_ADDR: "0.0.0.0:9200"
      OCIS_URL: "https://localhost:9200"
    volumes:
      - ocis_config:/etc/ocis
      - ocis_data:/var/lib/ocis
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --spider -q https://127.0.0.1:9200/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ocis_config:
  ocis_data: