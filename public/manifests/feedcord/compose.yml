# ===============================
# Docker Compose (FeedCord)
# ===============================
# host: (no web host — service runs as a background bot)
# username: (none)
# password: (none)

services:
  feedcord:
    image: qolors/feedcord:latest
    container_name: feedcord
    restart: unless-stopped
    volumes:
      # Must mount your JSON config into the container
      - feedcord_config:/app/config
    healthcheck:
      test: ["CMD", "stat", "/app/config/appsettings.json"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  feedcord_config:
