# ===============================
# Docker Compose (Teemii)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  teemii-frontend:
    image: dokkaner/teemii-frontend:latest
    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      VITE_APP_TITLE: Teemii
      VITE_APP_PORT: "80"

    depends_on:
      - teemii-backend

  teemii-backend:
    image: dokkaner/teemii-backend:latest
    restart: unless-stopped

    environment:
      EXPRESS_PORT: "3000"
      SOCKET_IO_PORT: "1555"

    volumes:
      - teemii_data:/data

volumes:
  teemii_data: