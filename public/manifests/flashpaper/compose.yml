# ===============================
# Docker Compose (FlashPaper)
# ===============================
# host: http://localhost:8080
# username: (none)
# password: (none; basic access controlled via BASE_URL logic or reverse proxy)

services:
  flashpaper:
    image: ghcr.io/andrewpaglusch/flashpaper:v2
    container_name: flashpaper
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # persistent SQLite DB and stored secrets
      - flashpaper_data:/var/www/html/data
    environment:
      # Customize your instance here:
      - SITE_TITLE=FlashPaper :: Self-Destructing Message
      - BASE_URL=http://localhost:8080
      - RETURN_FULL_URL=true
      - DISPLAY_LOGO=true
      - DISPLAY_TITLE=false
      - PRUNE_ENABLED=true
      - PRUNE_MIN_DAYS=1
      - PRUNE_MAX_DAYS=30
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flashpaper_data:
