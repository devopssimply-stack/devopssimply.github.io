# ===============================
# Docker Compose (PeaNUT)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  peanut:
    image: brandawg93/peanut:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      WEB_PORT: 8080
    volumes:
      - peanut_config:/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  peanut_config: