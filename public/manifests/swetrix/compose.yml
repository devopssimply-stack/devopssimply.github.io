# ===============================
# Docker Compose (Swetrix Analytics)
# ===============================
# host: http://localhost
# username: admin@localhost
# password: change_this_password

services:
  swetrix:
    image: swetrix/swetrix-fe:v3.2.0
    container_name: swetrix-frontend
    restart: unless-stopped
    depends_on:
      - swetrix-api
    ports:
      - "80:3000"
    environment:
      API_URL: http://localhost:8080/
      SELFHOSTED: "true"
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  swetrix-api:
    image: swetrix/swetrix-api:v3.2.3
    container_name: swetrix-api
    restart: unless-stopped
    depends_on:
      - redis
      - clickhouse
    ports:
      - "8080:5005"
    environment:
      JWT_ACCESS_TOKEN_SECRET: change_access_secret
      JWT_REFRESH_TOKEN_SECRET: change_refresh_secret
      REDIS_HOST: redis
      CLICKHOUSE_HOST: http://clickhouse
      API_ORIGINS: http://localhost
      EMAIL: admin@localhost
      PASSWORD: change_this_password
      API_KEY: change_api_key
      DEBUG_MODE: "false"
      CLOUDFLARE_PROXY_ENABLED: "false"
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:5005"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: swetrix-redis
    restart: unless-stopped
    environment:
      REDIS_PORT: "6379"
      REDIS_USER: default
      REDIS_PASSWORD: redispassword

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: swetrix-clickhouse
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    environment:
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_PASSWORD: clickhousepassword
    volumes:
      - swetrix_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  swetrix_clickhouse_data: