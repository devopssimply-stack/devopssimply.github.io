services:
  # Backend API
  backend:
    image: caddymanager/caddymanager-backend:latest
    container_name: caddymanager-backend
    restart: unless-stopped

    environment:
      PORT: "3000"

      # Database
      DB_ENGINE: sqlite
      SQLITE_DB_PATH: /app/data/caddymanager.sqlite

      # MongoDB (only used if DB_ENGINE=mongodb)
      MONGODB_URI: mongodb://mongoadmin:strongpassword@mongodb:27017/caddymanager?authSource=admin

      # App
      CORS_ORIGIN: http://localhost
      LOG_LEVEL: info

      CADDY_SANDBOX_URL: http://host.docker.internal:2019

      PING_INTERVAL: "30000"
      PING_TIMEOUT: "2000"

      AUDIT_LOG_MAX_SIZE_MB: "100"
      AUDIT_LOG_RETENTION_DAYS: "90"
      METRICS_HISTORY_MAX: "1000"

      JWT_SECRET: change-me
      JWT_EXPIRATION: 24h

    volumes:
      - sqlite_data:/app/data

    networks:
      - caddymanager

  # Frontend
  frontend:
    image: caddymanager/caddymanager-frontend:latest
    container_name: caddymanager-frontend
    restart: unless-stopped

    depends_on:
      - backend

    environment:
      BACKEND_HOST: backend:3000
      APP_NAME: Caddy Manager
      DARK_MODE: "true"

    ports:
      - "80:80"

    networks:
      - caddymanager

  # MongoDB (optional)
  mongodb:
    image: mongo:8.0
    container_name: caddymanager-mongodb
    restart: unless-stopped
    profiles: ["mongodb"]

    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: strongpassword

    volumes:
      - mongodb_data:/data/db

    networks:
      - caddymanager

networks:
  caddymanager:
    driver: bridge

volumes:
  sqlite_data:
  mongodb_data:
