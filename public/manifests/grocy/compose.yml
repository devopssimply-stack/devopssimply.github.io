# ===============================
# Docker Compose (Grocy)
# ===============================
# host: http://localhost:9283
# username: admin
# password: admin

services:
  grocy:
    # Use a trusted multi-platform community image
    image: lscr.io/linuxserver/grocy:latest
    restart: unless-stopped
    ports:
      - "9283:80"
    environment:
      # Optional UID/GID for file ownership (adjust to your host as needed)
      - PUID=1000
      - PGID=1000
      # Optional timezone
      - TZ=UTC
      # Default login — override for your deployment
      - GROCY_ADMIN_USERNAME=admin
      - GROCY_ADMIN_PASSWORD=admin
    volumes:
      # Persistent config/database/media storage
      - grocy-data:/config
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  grocy-data:
