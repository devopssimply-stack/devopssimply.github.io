services:
  clickhouse-server:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    restart: unless-stopped
    
    # Persist ClickHouse data
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server

    # Expose HTTP and native query ports
    ports:
      - "8123:8123"    # HTTP interface
      - "9000:9000"    # Native TCP client
      - "9009:9009"    # Interserver (optional)

    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    environment:
      # Optional environment variables to create a non-default user
      # CLICKHOUSE_DB: default
      # CLICKHOUSE_USER: user
      # CLICKHOUSE_PASSWORD: strong_password
      # CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"

volumes:
  clickhouse-data:
  clickhouse-logs:
