# ===============================
# Docker Compose (NPMplus - Host Mode)
# ===============================
# Admin UI: http://localhost:81
# Proxy: http://localhost / https://localhost
# Default login:
#   Email: admin@example.com
#   Password: changeme

services:
  npmplus:
    image: zoeyvid/npmplus:latest
    restart: unless-stopped
    network_mode: host

    environment:
      TZ: Europe/Amsterdam

    volumes:
      - npmplus_data:/data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:81 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  npmplus_data: