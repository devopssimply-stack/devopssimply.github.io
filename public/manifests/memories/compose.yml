# ===============================
# Docker Compose (Memories)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  memories:
    image: ghcr.io/pulsejet/memories:latest
    container_name: memories
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://memories:memories_password@memories-db:5432/memories
      - NODE_ENV=production
    depends_on:
      memories-db:
        condition: service_healthy
    volumes:
      - memories_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  memories-db:
    image: postgres:16-alpine
    container_name: memories-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=memories
      - POSTGRES_USER=memories
      - POSTGRES_PASSWORD=memories_password
    volumes:
      - memories_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memories -d memories"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  memories_data:
  memories_db_data: