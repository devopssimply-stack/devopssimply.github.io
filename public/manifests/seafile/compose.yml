# ===============================
# Docker Compose (Seafile 13)
# ===============================
# host: http://localhost
# username: me@example.com
# password: asecret

services:

  db:
    image: mariadb:10.11
    container_name: seafile-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "ROOT_PASSWORD"
      MYSQL_LOG_CONSOLE: "true"
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - seafile_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD","/usr/local/bin/healthcheck.sh","--connect","--mariadbupgrade","--innodb_initialized"]
      interval: 20s
      start_period: 30s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    container_name: seafile-redis
    command: ["redis-server","--requirepass","redispassword"]
    volumes:
      - seafile_redis_data:/data
    restart: unless-stopped


  seafile:
    image: seafileltd/seafile-mc:13.0-latest
    container_name: seafile
    ports:
      - "80:80"
    volumes:
      - seafile_data:/shared
    environment:
      SEAFILE_MYSQL_DB_HOST: "db"
      SEAFILE_MYSQL_DB_PORT: "3306"
      SEAFILE_MYSQL_DB_USER: "seafile"
      SEAFILE_MYSQL_DB_PASSWORD: "PASSWORD"
      INIT_SEAFILE_MYSQL_ROOT_PASSWORD: "ROOT_PASSWORD"

      SEAFILE_MYSQL_DB_CCNET_DB_NAME: "ccnet_db"
      SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: "seafile_db"
      SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: "seahub_db"

      TIME_ZONE: "Etc/UTC"

      INIT_SEAFILE_ADMIN_EMAIL: "me@example.com"
      INIT_SEAFILE_ADMIN_PASSWORD: "asecret"

      SEAFILE_SERVER_HOSTNAME: "localhost"
      SEAFILE_SERVER_PROTOCOL: "http"

      SITE_ROOT: "/"
      NON_ROOT: "false"

      JWT_PRIVATE_KEY: "replace_with_random_secret"

      ENABLE_GO_FILESERVER: "true"
      ENABLE_SEADOC: "true"

      CACHE_PROVIDER: "redis"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "redispassword"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped


volumes:
  seafile_mysql_data:
  seafile_data:
  seafile_redis_data:


networks:
  default:
    name: seafile-net