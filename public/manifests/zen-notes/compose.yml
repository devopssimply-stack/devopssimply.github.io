# ===============================
# Docker Compose (Zen)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  zen:
    image: ghcr.io/sheshbabu/zen/zen:latest
    container_name: zen
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: "UTC"
    volumes:
      - zen_data:/data
      - zen_images:/images
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  zen_data:
  zen_images: