# ===============================
# Docker Compose (qBittorrent + VueTorrent)
# ===============================
# host: http://localhost:8080
# username: admin
# password: adminadmin

services:
  qbit:
    image: linuxserver/qbittorrent:latest
    container_name: qbit
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      PUID: 1000
      PGID: 1000
      UMASK_SET: "022"
      TZ: Europe/London
      WEBUI_PORT: 8080
      DOCKER_MODS: ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - qbittorrent-config:/config
      - qbittorrent-downloads:/downloads

volumes:
  qbittorrent-config:
  qbittorrent-downloads: