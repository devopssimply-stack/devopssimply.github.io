services:
    docker-osx:
        image: 'sickcodes/docker-osx:latest'
        environment:
            - 'DISPLAY=${DISPLAY:-:0.0}'
        volumes:
            - '/tmp/.X11-unix:/tmp/.X11-unix'
        ports:
            - '50922:10022'
        devices:
            - /dev/kvm
	    restart: "unless-stopped"