# ===============================
# Docker Compose (Kimai)
# ===============================
# host: http://localhost:8001
# username: admin
# password: changeme

services:
  kimai:
    image: kimai/kimai2:latest
    container_name: kimai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgres://kimai:kimai@db:5432/kimai
      APP_ENV: prod
      ADMINMAIL: admin@example.com
      ADMINPASS: changeme
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:latest
    container_name: kimai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kimai
      POSTGRES_USER: kimai
      POSTGRES_PASSWORD: kimai
    volumes:
      - kimai_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kimai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kimai_db_data: