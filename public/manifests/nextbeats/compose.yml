# ===============================
# Docker Compose (Next Beats)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  next-beats:
    image: ghcr.io/btahir/next-beats:latest
    container_name: next-beats
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change_this_secret
      - SPOTIFY_CLIENT_ID=your_spotify_client_id
      - SPOTIFY_CLIENT_SECRET=your_spotify_client_secret
    volumes:
      - nextbeats_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  nextbeats_data: