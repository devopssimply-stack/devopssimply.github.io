# ===============================
# Docker Compose (Plex Rewind)
# ===============================
# host: http://localhost:8383
# username:
# password:
# ===============================

services:
  plex-rewind:
    image: ghcr.io/raunot/plex-rewind:latest
    restart: unless-stopped
    ports:
      - "8383:8383"
    environment:
      NEXTAUTH_SECRET: change-this-secret
      NEXTAUTH_URL: http://localhost:8383
      NEXT_PUBLIC_SITE_URL: http://localhost:8383
    volumes:
      - plex_rewind_config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8383 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  plex_rewind_config: