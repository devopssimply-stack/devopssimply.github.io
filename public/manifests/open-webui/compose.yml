# ===============================
# Docker Compose (Open WebUI)
# ===============================
# Web UI: http://localhost:3000
# Create admin on first visit

services:

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    tty: true

    volumes:
      - openwebui_ollama:/root/.ollama

    ports:
      - "11434:11434"

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped

    depends_on:
      ollama:
        condition: service_healthy

    ports:
      - "3000:8080"

    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: change_this_to_a_long_random_secret
      WEBUI_AUTH: "true"

    volumes:
      - openwebui_data:/app/backend/data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 512M

volumes:
  openwebui_data:
  openwebui_ollama: