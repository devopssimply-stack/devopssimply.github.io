# ===============================
# Docker Compose (Snipe-IT)
# ===============================
# host: http://localhost:8000
# username:
# password:

services:
  snipeit:
    image: snipe/snipe-it:latest
    container_name: snipeit
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:3ilviXqB9u6DX1NRcyWGJ+sjySF+H18CPDGb3+IVwMQ=
      APP_URL: http://localhost:8000
      APP_TIMEZONE: UTC
      APP_LOCALE: en-US
      MAX_RESULTS: "500"

      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: snipeit
      DB_USERNAME: snipeit
      DB_PASSWORD: changeme1234

      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      MAIL_FROM_ADDR: you@example.com
      MAIL_FROM_NAME: Snipe-IT

      IMAGE_LIB: gd
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_DRIVER: sync
      CACHE_PREFIX: snipeit

      LOGIN_MAX_ATTEMPTS: "5"
      LOGIN_LOCKOUT_DURATION: "60"
      RESET_PASSWORD_LINK_EXPIRES: "900"

      APP_FORCE_TLS: "false"
      ENABLE_HSTS: "false"

    volumes:
      - snipeit_storage:/var/lib/snipeit
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:11.4
    container_name: snipeit-mariadb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: snipeit
      MYSQL_USER: snipeit
      MYSQL_PASSWORD: changeme1234
      MYSQL_ROOT_PASSWORD: changeme1234
    volumes:
      - snipeit_db:/var/lib/mysql
    healthcheck:
      test: ["CMD","healthcheck.sh","--connect","--innodb_initialized"]
      interval: 5s
      timeout: 2s
      retries: 10

volumes:
  snipeit_storage:
  snipeit_db: