# ===============================
# Docker Compose (Frigate NVR)
# ===============================
# host: http://localhost:5000 (UI)
# username: configured via Frigate UI
# password: configured via Frigate UI

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    privileged: true
    shm_size: "512mb"
    ports:
      - "5000:5000"     # UI (unauthenticated)
      - "8971:8971"     # Authenticated UI/API
      - "8554:8554"     # RTSP streams
      - "8555:8555/tcp" # WebRTC (TCP)
      - "8555:8555/udp" # WebRTC (UDP)
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config                       # your config.yml
      - ./storage:/media/frigate               # recordings + clips
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      # Frigate RTSP camera credentials (if not in config)
      # - FRIGATE_RTSP_USERNAME=your_username
      # - FRIGATE_RTSP_PASSWORD=your_password
      # Optionally enable MQTT (point to your broker)
      # - FRIGATE_MQTT_HOST=mqtt://mqtt_host
      # - FRIGATE_MQTT_USERNAME=your_mqtt_user
      # - FRIGATE_MQTT_PASSWORD=your_mqtt_password
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
