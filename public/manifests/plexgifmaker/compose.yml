# ===============================
# Docker Compose (PlexGifMaker)
# ===============================
# host: http://localhost:9000
# username:
# password:
# ===============================

services:
  plexgifmaker:
    image: plexgifmaker:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      ASPNETCORE_URLS: http://+:9000
      FFREPORT: file=/logs/ffmpeg.log
    volumes:
      - plexgifmaker_keys:/usr/shared/plexgifmaker_keys
      - plexgifmaker_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  plexgifmaker_keys:
  plexgifmaker_logs: