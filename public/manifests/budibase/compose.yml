services:
  app-service:
    image: budibase/apps
    container_name: bbapps
    restart: unless-stopped

    environment:
      SELF_HOSTED: "1"
      PORT: "4002"

      COUCH_DB_URL: http://budibase:budibase@couchdb-service:5984
      WORKER_URL: http://worker-service:4003
      MINIO_URL: http://minio-service:9000

      MINIO_ACCESS_KEY: budibase
      MINIO_SECRET_KEY: budibase

      INTERNAL_API_KEY: budibase
      BUDIBASE_ENVIRONMENT: PRODUCTION

      API_ENCRYPTION_KEY: testsecret
      JWT_SECRET: testsecret

      REDIS_URL: redis-service:6379
      REDIS_PASSWORD: budibase
      REDIS_USERNAME: ""

      LOG_LEVEL: info
      ENABLE_ANALYTICS: "true"

      BB_ADMIN_USER_EMAIL: ""
      BB_ADMIN_USER_PASSWORD: ""

      PLUGINS_DIR: ""
      OFFLINE_MODE: ""

    depends_on:
      - worker-service
      - redis-service
      - couchdb-service
      - minio-service

  worker-service:
    image: budibase/worker
    container_name: bbworker
    restart: unless-stopped

    environment:
      SELF_HOSTED: "1"
      PORT: "4003"
      CLUSTER_PORT: "10000"

      API_ENCRYPTION_KEY: testsecret
      JWT_SECRET: testsecret

      MINIO_ACCESS_KEY: budibase
      MINIO_SECRET_KEY: budibase
      MINIO_URL: http://minio-service:9000

      APPS_URL: http://app-service:4002

      COUCH_DB_USERNAME: budibase
      COUCH_DB_PASSWORD: budibase
      COUCH_DB_URL: http://budibase:budibase@couchdb-service:5984

      INTERNAL_API_KEY: budibase

      REDIS_URL: redis-service:6379
      REDIS_PASSWORD: budibase
      REDIS_USERNAME: ""

      OFFLINE_MODE: ""

    depends_on:
      - redis-service
      - minio-service
      - couchdb-service

  proxy-service:
    image: budibase/proxy
    container_name: bbproxy
    restart: unless-stopped

    ports:
      - "10000:10000"

    environment:
      PROXY_RATE_LIMIT_WEBHOOKS_PER_SECOND: "10"
      PROXY_RATE_LIMIT_API_PER_SECOND: "50"

      APPS_UPSTREAM_URL: http://app-service:4002
      WORKER_UPSTREAM_URL: http://worker-service:4003
      MINIO_UPSTREAM_URL: http://minio-service:9000
      COUCHDB_UPSTREAM_URL: http://couchdb-service:5984

      RESOLVER: 127.0.0.11

    depends_on:
      - app-service
      - worker-service
      - minio-service
      - couchdb-service

  minio-service:
    image: minio/minio
    container_name: bbminio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ACCESS_KEY: budibase
      MINIO_SECRET_KEY: budibase
      MINIO_BROWSER: "off"

    volumes:
      - minio_data:/data

  couchdb-service:
    image: budibase/database:2.0.0
    container_name: bbcouchdb
    restart: unless-stopped

    environment:
      COUCHDB_USER: budibase
      COUCHDB_PASSWORD: budibase
      TARGETBUILD: docker-compose
      DATA_DIR: /data

    volumes:
      - couchdb_data:/data

  redis-service:
    image: redis:7-alpine
    container_name: bbredis
    restart: unless-stopped

    command: redis-server --requirepass "budibase"

    volumes:
      - redis_data:/data

volumes:
  couchdb_data:
  minio_data:
  redis_data:
