# ===============================
# Docker Compose (MeshCentral)
# ===============================
# host: https://localhost
# username: (first account created)
# password:

services:
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: meshcentral
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "443:443"
      - "80:80"
    environment:
      - DYNAMIC_CONFIG=false
      - HOSTNAME=localhost
      - PORT=443
      - REDIR_PORT=80
      - ALLOW_NEW_ACCOUNTS=false
      - USE_MONGODB=true
      - MONGO_URL=mongodb://meshcentral:meshcentral_password@mongodb:27017/meshcentral
    volumes:
      - meshcentral_data:/opt/meshcentral/meshcentral-data
      - meshcentral_files:/opt/meshcentral/meshcentral-files
      - meshcentral_web:/opt/meshcentral/meshcentral-web
      - meshcentral_backups:/opt/meshcentral/meshcentral-backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "https://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mongodb:
    image: mongo:7
    container_name: meshcentral-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=meshcentral
      - MONGO_INITDB_ROOT_USERNAME=meshcentral
      - MONGO_INITDB_ROOT_PASSWORD=meshcentral_password
    volumes:
      - meshcentral_mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  meshcentral_data:
  meshcentral_files:
  meshcentral_web:
  meshcentral_backups:
  meshcentral_mongodb: