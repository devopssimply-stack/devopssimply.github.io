# ===============================
# Docker Compose (Lute v3)
# ===============================
# host: http://localhost:3000
# username:
# password:

services:
  lute:
    image: ghcr.io/luteorg/lute-v3:latest
    container_name: lute
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - lute_data:/app/data
      - lute_music:/app/music

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  lute_data:
  lute_music: