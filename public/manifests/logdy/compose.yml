# ===============================
# Docker Compose (Logdy Core)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  logdy:
    image: logdyhq/logdy-core:latest
    container_name: logdy
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - logdy_data:/data

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  logdy_data: