# ===============================
# Docker Compose (Mealie)
# ===============================
# host: http://localhost:9000
# username: (created during first setup)
# password: (created during first setup)
# database user: mealie
# database password: change_this_password

services:
  postgres:
    image: postgres:16-alpine
    container_name: mealie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mealie
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD: change_this_password
    volumes:
      - mealie_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealie"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      DB_ENGINE: postgres
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD: change_this_password
      POSTGRES_DB: mealie
    volumes:
      - mealie_data:/app/data
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - external

volumes:
  mealie_postgres_data:
  mealie_data:

networks:
  internal:
    internal: true
  external: