# ===============================
# Docker Compose (HabitTrove)
# ===============================
# host: http://localhost:8080
# username:
# password:

services:
  habittrove:
    image: ghcr.io/dohsimpson/habittrove:latest
    container_name: habittrove
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - habittrove_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  habittrove_data:
