# ===============================
# Docker Compose (pyLoad NG)
# ===============================
# host: http://localhost:8000
# username: pyload
# password: pyload

services:
  pyload-ng:
    image: lscr.io/linuxserver/pyload-ng:latest
    container_name: pyload-ng
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9666:9666"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - pyload_config:/config
      - pyload_downloads:/downloads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pyload_config:
  pyload_downloads: