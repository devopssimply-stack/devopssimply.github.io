<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(to bottom, #f9fafb, #ffffff);
    }
    .container {
      text-align: center;
    }
    .spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .text {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
  <script>
    // Social media mapping
    const socialMediaMap = {
      "facebook": ["f", "fb"],
      "instagram": ["i", "ig"],
      "x": ["x", "tw", "twitter"],
      "threads": ["t", "th"],
      "linkedin": ["l", "li"],
      "youtube": ["y", "yt"],
      "tiktok": ["tt", "tk"],
      "reddit": ["r", "rd"],
      "pinterest": ["p", "pin"],
      "snapchat": ["s", "sc"]
    };

    // Get the full path from URL hash (GitHub Pages uses hash routing for 404 redirects)
    const path = window.location.hash.slice(1) || window.location.pathname.replace('/go.html', '');
    
    // Parse /go/{social}/{slug} or /{social}/{slug}
    const match = path.match(/^\/?(go\/)?([^\/]+)\/([^\/]+)\/?$/);
    
    if (match) {
      const socialShort = match[2];
      const slug = match[3];
      
      // Find the full social media name
      let socialName = null;
      for (const [platform, aliases] of Object.entries(socialMediaMap)) {
        if (aliases.includes(socialShort.toLowerCase())) {
          socialName = platform;
          break;
        }
      }
      
      if (socialName && slug) {
        // Redirect to homepage with tracking
        const baseUrl = window.location.origin;
        window.location.replace(`${baseUrl}/?id=${slug}&utm_source=${socialName}`);
      } else {
        // Invalid format, go to homepage
        window.location.replace(window.location.origin);
      }
    } else {
      // Invalid format, go to homepage
      window.location.replace(window.location.origin);
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p class="text">Redirecting...</p>
  </div>
</body>
</html>
